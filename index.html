<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Election Results - Save Menu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e9e9ec;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;justify-content:center;min-height:100vh;}
.wrapper{width:100%;max-width:430px;background:#f2f2f4}
.container{background:#f2f2f4;padding:18px}

/* HEADER */
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}
h1{font-size:22px;font-weight:700;color:#1c1c1e}
#clock{font-size:12px;color:#1c1c1e;font-weight:600;background:rgba(142,142,147,0.15);padding:6px 11px;border-radius:30px;white-space:nowrap}

/* SAVE MENU BUTTON */
.menu-btn{background:#007aff;color:#fff;border:none;border-radius:30px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px;width:100%}

/* ADDRESS */
.address-box{background:#fff;border-radius:18px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.address-icon{font-size:16px}
.addr-inp{font-size:15px;border:none;outline:none;background:transparent;width:100%}

hr{border:none;height:1px;background:#d1d1d6;margin:0 0 14px}

/* CARDS */
.cards{display:flex;gap:8px;margin-bottom:10px;transition:all 0.3s ease}
.card{flex:1;background:#fff;border-radius:20px;padding:12px 4px 16px;text-align:center;position:relative;box-shadow:0 10px 20px rgba(0,0,0,0.1);transition:all 0.3s ease}
.rank{position:absolute;top:6px;left:6px;padding:4px 8px;border-radius:20px;font-size:10px;font-weight:800;color:#fff}
.gold .rank{background:#b38b3a}
.silver .rank{background:#8e8e93}
.bronze .rank{background:#9b5e2a}

/* PHOTO RING */
.photo-wrap{width:70px;height:70px;margin:15px auto 8px;position:relative}
.ring-bg{width:100%;height:100%;border-radius:50%;padding:4px;margin:0 auto}
.gold-ring{background:linear-gradient(45deg,#d4af37,#f9e27a,#d4af37)}
.silver-ring{background:linear-gradient(45deg,#c0c0c0,#ffffff,#c0c0c0)}
.bronze-ring{background:linear-gradient(45deg,#cd7f32,#f2c18d,#cd7f32)}
.circle{width:100%;height:100%;border-radius:50%;background:#f5f5f7;display:flex;align-items:center;justify-content:center;overflow:hidden}
.circle img{width:100%;height:100%;object-fit:cover;display:none}
.plus{font-size:24px;color:#aaa}
.photo-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}

.divider{height:1px;background:#ddd;margin:8px 0 10px}

/* TEXT INPUTS - FIXED: darker for better visibility in download */
.ci{width:100%;border:none;background:transparent;text-align:center;font-size:13px;padding:4px 0;outline:none}
.cn{font-weight:900;color:#000}
.cp{font-weight:800;font-size:12px;letter-spacing:0.8px}
.cv{font-size:16px;font-weight:900}
.gt{color:#9e741b;font-weight:900}
.st{color:#2c2c2e;font-weight:900}
.bt{color:#6b3f1a;font-weight:900}

/* NEEDS TO WIN */
.needs-box{background:#fff;border-radius:18px;margin-bottom:12px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.needs-hdr{background:#2c2c2e;padding:8px 12px;color:#fff;font-size:10px;font-weight:800;letter-spacing:1px}
.needs-row{display:flex;align-items:center;padding:10px 12px;gap:8px;border-bottom:1px solid #eee}
.needs-row:last-child{border-bottom:none}
.ndot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
.ndot.silver{background:#8e8e93}
.ndot.bronze{background:#9b5e2a}
.nname{font-size:12px;font-weight:800;flex:1}
.nright{display:flex;flex-direction:column;align-items:flex-end}
.nnum{font-size:15px;font-weight:900}
.nlbl{font-size:8px;color:#8e8e93;font-weight:600}

/* MAP BOX */
.map-box{background:#fff;border-radius:20px;padding:14px;margin-bottom:10px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
.map-title{text-align:center;font-size:11px;letter-spacing:2px;color:#8e8e93;margin-bottom:10px;font-weight:700}
.map-container{width:100%;height:160px;border-radius:16px;overflow:hidden;position:relative;background:#f0f0f3;touch-action:none}
.map-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0f0f3;z-index:1}
.map-ph-plus{font-size:36px;color:#aaa}
.map-ph-hint{font-size:10px;color:#aaa;margin-top:5px}
#mapImg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none;cursor:move;transition:transform 0.05s;z-index:2}
#mapFile{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:3}

/* MAP CONTROLS - These will be hidden in download */
.map-controls{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.map-btn{background:#f0f0f3;border:none;border-radius:30px;padding:6px 12px;font-size:11px;font-weight:600;color:#1c1c1e;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
.map-btn:active{background:#e0e0e3}

/* SAVE MENU MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center}
.modal-content{background:#fff;border-radius:28px;width:90%;max-width:380px;max-height:80vh;overflow-y:auto;padding:20px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:15px;color:#1c1c1e}
.location-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #eee;cursor:pointer}
.location-item:hover{background:#f5f5f7}
.location-name{font-weight:600;font-size:14px}
.location-date{font-size:11px;color:#8e8e93}
.delete-btn{color:#ff3b30;font-size:14px;padding:5px}
.save-input{width:100%;padding:12px;border:1px solid #ddd;border-radius:16px;margin-bottom:10px;font-size:14px}
.modal-btn{background:#007aff;color:#fff;border:none;border-radius:30px;padding:12px;font-weight:600;width:100%;margin-top:10px}

/* DOWNLOAD */
.dl-wrap{padding:18px;background:#f2f2f4}
#dlBtn{width:100%;padding:16px;border:none;background:#1c1c1e;color:#fff;font-weight:700;font-size:16px;border-radius:40px;cursor:pointer;box-shadow:0 10px 20px rgba(0,0,0,0.2)}
</style>
</head>
<body>
<div class="wrapper">
 <div class="container" id="captureArea">

  <!-- HEADER with NEPAL TIME -->
  <div class="top">
   <h1>Election Results</h1>
   <div id="clock">--:--:-- AM</div>
  </div>

  <!-- SAVE MENU BUTTON -->
  <button class="menu-btn" onclick="openSaveMenu()">📋 LOCATIONS MENU</button>

  <!-- ADDRESS -->
  <div class="address-box">
   <span class="address-icon">📍</span>
   <input class="addr-inp" id="addrInp" type="text" placeholder="Election venue / address">
  </div>

  <hr>

  <!-- CARDS -->
  <div class="cards" id="cardsContainer">
   <!-- Card 1 -->
   <div class="card gold" id="card1">
    <div class="rank">1st</div>
    <div class="photo-wrap">
     <div class="ring-bg gold-ring">
      <div class="circle" id="circle1">
       <span class="plus">+</span>
       <img id="img1" alt="">
      </div>
     </div>
     <input type="file" accept="image/*" class="photo-input" id="ph1" onchange="uploadPhoto(this, 'img1', 1)">
    </div>
    <div class="divider"></div>
    <input class="ci cn gt" id="n1" value="THOMAS F." oninput="updateAll()">
    <input class="ci cp gt" id="p1" value="PROGRESS" oninput="updateAll()">
    <input class="ci cv gt" id="v1" value="14250" oninput="updateAll()" onblur="formatVote(this)">
   </div>

   <!-- Card 2 -->
   <div class="card silver" id="card2">
    <div class="rank">2nd</div>
    <div class="photo-wrap">
     <div class="ring-bg silver-ring">
      <div class="circle" id="circle2">
       <span class="plus">+</span>
       <img id="img2" alt="">
      </div>
     </div>
     <input type="file" accept="image/*" class="photo-input" id="ph2" onchange="uploadPhoto(this, 'img2', 2)">
    </div>
    <div class="divider"></div>
    <input class="ci cn st" id="n2" value="LISA M." oninput="updateAll()">
    <input class="ci cp st" id="p2" value="UNITY" oninput="updateAll()">
    <input class="ci cv st" id="v2" value="11230" oninput="updateAll()" onblur="formatVote(this)">
   </div>

   <!-- Card 3 -->
   <div class="card bronze" id="card3">
    <div class="rank">3rd</div>
    <div class="photo-wrap">
     <div class="ring-bg bronze-ring">
      <div class="circle" id="circle3">
       <span class="plus">+</span>
       <img id="img3" alt="">
      </div>
     </div>
     <input type="file" accept="image/*" class="photo-input" id="ph3" onchange="uploadPhoto(this, 'img3', 3)">
    </div>
    <div class="divider"></div>
    <input class="ci cn bt" id="n3" value="JAMES K." oninput="updateAll()">
    <input class="ci cp bt" id="p3" value="HORIZON" oninput="updateAll()">
    <input class="ci cv bt" id="v3" value="9850" oninput="updateAll()" onblur="formatVote(this)">
   </div>
  </div>

  <!-- NEEDS TO WIN -->
  <div class="needs-box">
   <div class="needs-hdr">🗳 VOTES NEEDED TO WIN</div>
   <div class="needs-row" id="needRow2">
    <div class="ndot silver">2</div>
    <div class="nname" id="needsName2">LISA M.</div>
    <div class="nright">
     <div class="nnum" id="needsVotes2">0</div>
     <div class="nlbl">votes needed</div>
    </div>
   </div>
   <div class="needs-row" id="needRow3">
    <div class="ndot bronze">3</div>
    <div class="nname" id="needsName3">JAMES K.</div>
    <div class="nright">
     <div class="nnum" id="needsVotes3">0</div>
     <div class="nlbl">votes needed</div>
    </div>
   </div>
  </div>

  <hr>

  <!-- MAP with CONTROLS (will be hidden in download) -->
  <div class="map-box">
   <div class="map-title">REGION MAP</div>
   <div class="map-container" id="mapContainer">
    <div class="map-ph" id="mapPH">
     <div class="map-ph-plus">+</div>
     <div class="map-ph-hint">Tap to add map</div>
    </div>
    <img id="mapImg" alt="" draggable="false">
    <input type="file" accept="image/*" id="mapFile" onchange="uploadMap(this)">
   </div>
   
   <!-- MAP CONTROLS - These will be hidden in download -->
   <div class="map-controls" id="mapControls" style="display:none">
    <button class="map-btn" id="zoomInBtn" onclick="mapZoom(0.2)">➕ Zoom In</button>
    <button class="map-btn" id="zoomOutBtn" onclick="mapZoom(-0.2)">➖ Zoom Out</button>
    <button class="map-btn" id="resetMapBtn" onclick="resetMap()">⟲ Reset</button>
    <button class="map-btn" id="changeMapBtn" onclick="changeMap()">🖼 Change</button>
   </div>
  </div>

 </div> <!-- end captureArea -->

 <!-- DOWNLOAD BUTTON -->
 <div class="dl-wrap">
  <button id="dlBtn" onclick="downloadImage()">⬇ Download JPG</button>
 </div>
</div>

<!-- SAVE MENU MODAL -->
<div class="modal" id="saveModal" onclick="if(event.target===this) closeSaveMenu()">
 <div class="modal-content">
  <div class="modal-title">📍 Saved Locations</div>
  <div id="locationsList"></div>
  <input type="text" class="save-input" id="newLocationName" placeholder="Enter location name">
  <button class="modal-btn" onclick="saveCurrentLocation()">💾 Save Current Location</button>
  <button class="modal-btn" style="background:#8e8e93;margin-top:5px" onclick="closeSaveMenu()">Close</button>
 </div>
</div>

<script>
// ===== NEPAL TIME =====
function updateNepalTime() {
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const npt = new Date(utc + (345 * 60000));
  
  let hours = npt.getHours();
  const minutes = npt.getMinutes().toString().padStart(2, '0');
  const seconds = npt.getSeconds().toString().padStart(2, '0');
  
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  hours = hours ? hours : 12;
  const hoursStr = hours.toString().padStart(2, '0');
  
  document.getElementById('clock').textContent = `${hoursStr}:${minutes}:${seconds} ${ampm} NPT`;
}
updateNepalTime();
setInterval(updateNepalTime, 1000);

// ===== CANDIDATE DATA =====
let candidates = [
  { id: 1, name: '', party: '', votes: 0, img: '', cardPos: 1 },
  { id: 2, name: '', party: '', votes: 0, img: '', cardPos: 2 },
  { id: 3, name: '', party: '', votes: 0, img: '', cardPos: 3 }
];

// ===== PHOTO UPLOAD =====
function uploadPhoto(input, imgId, cardNum) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById(imgId);
      img.src = e.target.result;
      img.style.display = 'block';
      
      const plus = img.parentElement.querySelector('.plus');
      if (plus) plus.style.display = 'none';
      
      const candidateIndex = candidates.findIndex(c => c.cardPos === cardNum);
      if (candidateIndex !== -1) {
        candidates[candidateIndex].img = e.target.result;
      }
    };
    reader.readAsDataURL(input.files[0]);
  }
}

// ===== GET RAW VOTES =====
function getRawVote(id) {
  const el = document.getElementById(id);
  return parseInt(el.value.replace(/[^0-9]/g, '')) || 0;
}

// ===== UPDATE ALL =====
function updateAll() {
  candidates[0].name = document.getElementById('n1').value;
  candidates[0].party = document.getElementById('p1').value;
  candidates[0].votes = getRawVote('v1');
  
  candidates[1].name = document.getElementById('n2').value;
  candidates[1].party = document.getElementById('p2').value;
  candidates[1].votes = getRawVote('v2');
  
  candidates[2].name = document.getElementById('n3').value;
  candidates[2].party = document.getElementById('p3').value;
  candidates[2].votes = getRawVote('v3');
  
  const sorted = [...candidates].sort((a, b) => b.votes - a.votes);
  
  for (let i = 0; i < 3; i++) {
    sorted[i].cardPos = i + 1;
  }
  
  updateCardUI(sorted);
  updateNeedsToWin(sorted);
}

function updateCardUI(sorted) {
  const card1Candidate = sorted.find(c => c.cardPos === 1);
  const card2Candidate = sorted.find(c => c.cardPos === 2);
  const card3Candidate = sorted.find(c => c.cardPos === 3);
  
  document.getElementById('n1').value = card1Candidate.name;
  document.getElementById('p1').value = card1Candidate.party;
  document.getElementById('v1').value = card1Candidate.votes.toLocaleString();
  
  document.getElementById('n2').value = card2Candidate.name;
  document.getElementById('p2').value = card2Candidate.party;
  document.getElementById('v2').value = card2Candidate.votes.toLocaleString();
  
  document.getElementById('n3').value = card3Candidate.name;
  document.getElementById('p3').value = card3Candidate.party;
  document.getElementById('v3').value = card3Candidate.votes.toLocaleString();
  
  if (card1Candidate.img) {
    document.getElementById('img1').src = card1Candidate.img;
    document.getElementById('img1').style.display = 'block';
    document.querySelector('#circle1 .plus').style.display = 'none';
  }
  
  if (card2Candidate.img) {
    document.getElementById('img2').src = card2Candidate.img;
    document.getElementById('img2').style.display = 'block';
    document.querySelector('#circle2 .plus').style.display = 'none';
  }
  
  if (card3Candidate.img) {
    document.getElementById('img3').src = card3Candidate.img;
    document.getElementById('img3').style.display = 'block';
    document.querySelector('#circle3 .plus').style.display = 'none';
  }
}

function updateNeedsToWin(sorted) {
  const first = sorted[0];
  const second = sorted[1];
  const third = sorted[2];
  
  document.getElementById('needsName2').textContent = second.name || '2nd Place';
  document.getElementById('needsName3').textContent = third.name || '3rd Place';
  
  const need2 = Math.max(0, first.votes - second.votes + 1);
  const need3 = Math.max(0, first.votes - third.votes + 1);
  
  document.getElementById('needsVotes2').textContent = need2.toLocaleString();
  document.getElementById('needsVotes3').textContent = need3.toLocaleString();
}

function formatVote(input) {
  const num = parseInt(input.value.replace(/[^0-9]/g, '')) || 0;
  input.value = num.toLocaleString();
  updateAll();
}

// ===== MAP FUNCTIONS =====
let mapScale = 1;
let mapX = 0;
let mapY = 0;
let isDragging = false;
let startX, startY;

function uploadMap(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById('mapImg');
      img.src = e.target.result;
      img.style.display = 'block';
      
      mapScale = 1;
      mapX = 0;
      mapY = 0;
      updateMapTransform();
      
      document.getElementById('mapPH').style.display = 'none';
      document.getElementById('mapControls').style.display = 'flex';
    };
    reader.readAsDataURL(input.files[0]);
    input.value = '';
  }
}

function updateMapTransform() {
  const img = document.getElementById('mapImg');
  img.style.transform = `translate(${mapX}px, ${mapY}px) scale(${mapScale})`;
}

function mapZoom(delta) {
  mapScale = Math.max(0.5, Math.min(3, mapScale + delta));
  updateMapTransform();
}

function resetMap() {
  mapScale = 1;
  mapX = 0;
  mapY = 0;
  updateMapTransform();
}

function changeMap() {
  document.getElementById('mapFile').click();
}

// Touch events
const mapImg = document.getElementById('mapImg');

mapImg.addEventListener('touchstart', function(e) {
  if (!mapImg.src) return;
  e.preventDefault();
  isDragging = true;
  startX = e.touches[0].clientX - mapX;
  startY = e.touches[0].clientY - mapY;
}, { passive: false });

mapImg.addEventListener('touchmove', function(e) {
  if (!isDragging) return;
  e.preventDefault();
  mapX = e.touches[0].clientX - startX;
  mapY = e.touches[0].clientY - startY;
  updateMapTransform();
}, { passive: false });

mapImg.addEventListener('touchend', function() {
  isDragging = false;
});

// Pinch zoom
let initialDistance = null;
let initialScale = 1;

mapImg.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    initialDistance = Math.sqrt(dx * dx + dy * dy);
    initialScale = mapScale;
  }
});

mapImg.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const currentDistance = Math.sqrt(dx * dx + dy * dy);
    const scaleChange = currentDistance / initialDistance;
    mapScale = Math.max(0.5, Math.min(3, initialScale * scaleChange));
    updateMapTransform();
  }
});

// ===== SAVE MENU FUNCTIONS =====
function openSaveMenu() {
  document.getElementById('saveModal').style.display = 'flex';
  loadLocationsList();
}

function closeSaveMenu() {
  document.getElementById('saveModal').style.display = 'none';
}

function loadLocationsList() {
  const listDiv = document.getElementById('locationsList');
  listDiv.innerHTML = '';
  
  for(let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if(key.startsWith('election_')) {
      const data = JSON.parse(localStorage.getItem(key));
      const locationName = key.replace('election_', '');
      
      const item = document.createElement('div');
      item.className = 'location-item';
      item.innerHTML = `
        <div style="flex:1" onclick="loadLocation('${locationName}')">
          <div class="location-name">${locationName}</div>
          <div class="location-date">${data.savedDate || ''}</div>
        </div>
        <div class="delete-btn" onclick="deleteLocation('${locationName}'); event.stopPropagation()">✕</div>
      `;
      listDiv.appendChild(item);
    }
  }
  
  if(listDiv.innerHTML === '') {
    listDiv.innerHTML = '<div style="padding:20px;text-align:center;color:#8e8e93">No saved locations</div>';
  }
}

function saveCurrentLocation() {
  const locationName = document.getElementById('newLocationName').value.trim();
  if(!locationName) {
    alert('Please enter a location name');
    return;
  }
  
  const locationData = {
    name: locationName,
    candidates: [
      { name: n1.value, party:
