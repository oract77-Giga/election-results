<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Election Results - Simple</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#e9e9ec;display:flex;justify-content:center;padding:10px}
.wrapper{width:100%;max-width:430px;background:#f2f2f4;padding:15px;border-radius:20px}

/* HEADER */
.top{display:flex;justify-content:space-between;margin-bottom:15px}
h1{font-size:22px}
#clock{background:#ddd;padding:5px 15px;border-radius:20px}

/* ADDRESS */
.address-box{background:white;border-radius:15px;padding:10px;margin-bottom:15px}
.addr-inp{width:100%;border:none;font-size:14px;outline:none}

hr{margin:10px 0}

/* CARDS */
.cards{display:flex;gap:5px;margin-bottom:15px}
.card{flex:1;background:white;border-radius:15px;padding:10px 3px;text-align:center}
.rank{background:gold;display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;color:white}
.gold .rank{background:#b38a3b}
.silver .rank{background:#8e8e93}
.bronze .rank{background:#9b5e2a}

.photo-wrap{width:60px;height:60px;margin:15px auto;border-radius:50%;overflow:hidden;border:3px solid #f0f0f0}
.photo-wrap img{width:100%;height:100%;object-fit:cover}
.photo-placeholder{width:100%;height:100%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:20px;color:#999}

.ci{width:100%;border:none;text-align:center;padding:3px 0;background:transparent;outline:none}
.cn{font-weight:bold}
.cp{font-size:10px}
.cv{font-weight:bold}

/* NEEDS */
.needs-box{background:white;border-radius:15px;padding:10px;margin:15px 0}
.needs-hdr{background:#333;color:white;padding:8px;border-radius:10px;font-size:12px;margin-bottom:10px}
.needs-row{display:flex;align-items:center;padding:8px 5px;border-bottom:1px solid #eee}
.ndot{width:20px;height:20px;border-radius:50%;background:gray;color:white;display:flex;align-items:center;justify-content:center;font-size:10px;margin-right:10px}
.ndot.silver{background:#8e8e93}
.ndot.bronze{background:#9b5e2a}
.nname{flex:1;font-size:14px}
.nnum{font-weight:bold}
.nlbl{font-size:10px;color:#999}

/* MAP */
.map-box{background:white;border-radius:15px;padding:15px;margin:15px 0}
.map-container{width:100%;height:150px;background:#f0f0f0;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.map-img{max-width:100%;max-height:100%;object-fit:contain}
.map-placeholder{text-align:center;color:#999}
.map-placeholder .plus{font-size:40px}

/* BUTTONS */
.btn{width:100%;padding:15px;border:none;border-radius:30px;font-size:16px;margin:5px 0;cursor:pointer}
.btn-primary{background:#007aff;color:white}
.btn-black{background:black;color:white}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}
.modal-content{background:white;width:90%;max-width:380px;margin:50px auto;border-radius:20px;padding:20px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:bold;margin-bottom:15px}
.location-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee}
.delete-btn{color:red;cursor:pointer}
</style>
</head>
<body>
<div class="wrapper">
  <!-- Main Content -->
  <div id="mainContent">
    <div class="top">
      <h1>Election Results</h1>
      <div id="clock">--:--:--</div>
    </div>

    <!-- Address -->
    <div class="address-box">
      <input class="addr-inp" id="address" placeholder="Election venue..." value="Central Hall">
    </div>

    <hr>

    <!-- Cards -->
    <div class="cards">
      <!-- 1st -->
      <div class="card gold">
        <div class="rank">1st</div>
        <div class="photo-wrap" onclick="document.getElementById('file1').click()">
          <img id="img1" src="" style="display:none">
          <div id="placeholder1" class="photo-placeholder">+</div>
        </div>
        <input type="file" id="file1" accept="image/*" style="display:none" onchange="loadImage(1)">
        <input class="ci cn" id="name1" value="THOMAS F.">
        <input class="ci cp" id="party1" value="PROGRESS">
        <input class="ci cv" id="votes1" value="14250" inputmode="numeric">
      </div>

      <!-- 2nd -->
      <div class="card silver">
        <div class="rank">2nd</div>
        <div class="photo-wrap" onclick="document.getElementById('file2').click()">
          <img id="img2" src="" style="display:none">
          <div id="placeholder2" class="photo-placeholder">+</div>
        </div>
        <input type="file" id="file2" accept="image/*" style="display:none" onchange="loadImage(2)">
        <input class="ci cn" id="name2" value="LISA M.">
        <input class="ci cp" id="party2" value="UNITY">
        <input class="ci cv" id="votes2" value="11230" inputmode="numeric">
      </div>

      <!-- 3rd -->
      <div class="card bronze">
        <div class="rank">3rd</div>
        <div class="photo-wrap" onclick="document.getElementById('file3').click()">
          <img id="img3" src="" style="display:none">
          <div id="placeholder3" class="photo-placeholder">+</div>
        </div>
        <input type="file" id="file3" accept="image/*" style="display:none" onchange="loadImage(3)">
        <input class="ci cn" id="name3" value="JAMES K.">
        <input class="ci cp" id="party3" value="HORIZON">
        <input class="ci cv" id="votes3" value="9850" inputmode="numeric">
      </div>
    </div>

    <!-- Needs Box -->
    <div class="needs-box">
      <div class="needs-hdr">🗳 VOTES NEEDED TO WIN</div>
      <div class="needs-row">
        <div class="ndot silver">2</div>
        <div class="nname" id="needName2">LISA M.</div>
        <div><span class="nnum" id="needVotes2">0</span><span class="nlbl"> needed</span></div>
      </div>
      <div class="needs-row">
        <div class="ndot bronze">3</div>
        <div class="nname" id="needName3">JAMES K.</div>
        <div><span class="nnum" id="needVotes3">0</span><span class="nlbl"> needed</span></div>
      </div>
    </div>

    <!-- Map -->
    <div class="map-box">
      <div class="map-title">🗺 REGION MAP</div>
      <div class="map-container" onclick="document.getElementById('mapFile').click()">
        <img id="mapImg" class="map-img" src="" style="display:none">
        <div id="mapPlaceholder" class="map-placeholder">
          <div class="plus">+</div>
          <div>Tap to add map</div>
        </div>
      </div>
      <input type="file" id="mapFile" accept="image/*" style="display:none" onchange="loadMap()">
    </div>
  </div>

  <!-- Buttons -->
  <button class="btn btn-primary" onclick="openMenu()">📋 LOCATIONS MENU</button>
  <button class="btn btn-black" onclick="downloadImage()">⬇ DOWNLOAD JPG</button>

  <!-- Modal -->
  <div class="modal" id="menuModal" onclick="if(event.target===this) closeMenu()">
    <div class="modal-content">
      <div class="modal-title">Saved Locations</div>
      <div id="locationsList"></div>
      <input type="text" id="locName" placeholder="New location name" style="width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ddd">
      <button class="btn btn-primary" onclick="saveLocation()" style="margin:5px 0">💾 SAVE CURRENT</button>
      <button class="btn" style="background:#666;color:white" onclick="closeMenu()">CLOSE</button>
    </div>
  </div>
</div>

<script>
// ===== SIMPLE CLOCK =====
function updateClock() {
  const d = new Date();
  document.getElementById('clock').innerText = 
    d.getHours().toString().padStart(2,'0') + ':' +
    d.getMinutes().toString().padStart(2,'0') + ':' +
    d.getSeconds().toString().padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ===== SIMPLE IMAGE LOAD =====
function loadImage(num) {
  const file = document.getElementById('file' + num).files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById('img' + num);
      const placeholder = document.getElementById('placeholder' + num);
      img.src = e.target.result;
      img.style.display = 'block';
      placeholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
}

// ===== SIMPLE MAP LOAD =====
function loadMap() {
  const file = document.getElementById('mapFile').files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById('mapImg');
      const placeholder = document.getElementById('mapPlaceholder');
      img.src = e.target.result;
      img.style.display = 'block';
      placeholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
}

// ===== GET VOTES =====
function getVote(id) {
  const val = document.getElementById(id).value;
  return parseInt(val.replace(/[^0-9]/g, '')) || 0;
}

// ===== UPDATE NEEDS =====
function updateNeeds() {
  // Get votes
  const v1 = getVote('votes1');
  const v2 = getVote('votes2');
  const v3 = getVote('votes3');
  
  // Get names
  const n1 = document.getElementById('name1').value;
  const n2 = document.getElementById('name2').value;
  const n3 = document.getElementById('name3').value;
  
  // Find winner (most votes)
  const maxVotes = Math.max(v1, v2, v3);
  
  // Calculate needs
  const need2 = v2 < maxVotes ? (maxVotes - v2 + 1) : 0;
  const need3 = v3 < maxVotes ? (maxVotes - v3 + 1) : 0;
  
  // Update display
  document.getElementById('needName2').innerText = n2;
  document.getElementById('needName3').innerText = n3;
  document.getElementById('needVotes2').innerText = need2.toLocaleString();
  document.getElementById('needVotes3').innerText = need3.toLocaleString();
}

// Update on input
['votes1','votes2','votes3','name1','name2','name3'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateNeeds);
});

// ===== LOCAL STORAGE SAVE/LOAD =====
function saveLocation() {
  const name = document.getElementById('locName').value;
  if (!name) {
    alert('Enter a name');
    return;
  }
  
  // Save data
  const data = {
    addr: document.getElementById('address').value,
    n1: document.getElementById('name1').value,
    p1: document.getElementById('party1').value,
    v1: document.getElementById('votes1').value,
    img1: document.getElementById('img1').src,
    n2: document.getElementById('name2').value,
    p2: document.getElementById('party2').value,
    v2: document.getElementById('votes2').value,
    img2: document.getElementById('img2').src,
    n3: document.getElementById('name3').value,
    p3: document.getElementById('party3').value,
    v3: document.getElementById('votes3').value,
    img3: document.getElementById('img3').src,
    map: document.getElementById('mapImg').src
  };
  
  try {
    localStorage.setItem('elec_' + name, JSON.stringify(data));
    document.getElementById('locName').value = '';
    alert('Saved!');
    loadLocations(); // Refresh list
  } catch (e) {
    alert('Error saving. Try smaller images.');
  }
}

function loadLocation(name) {
  const data = JSON.parse(localStorage.getItem('elec_' + name));
  if (!data) return;
  
  // Restore data
  document.getElementById('address').value = data.addr || '';
  
  document.getElementById('name1').value = data.n1 || '';
  document.getElementById('party1').value = data.p1 || '';
  document.getElementById('votes1').value = data.v1 || '0';
  
  document.getElementById('name2').value = data.n2 || '';
  document.getElementById('party2').value = data.p2 || '';
  document.getElementById('votes2').value = data.v2 || '0';
  
  document.getElementById('name3').value = data.n3 || '';
  document.getElementById('party3').value = data.p3 || '';
  document.getElementById('votes3').value = data.v3 || '0';
  
  // Restore images
  if (data.img1) {
    document.getElementById('img1').src = data.img1;
    document.getElementById('img1').style.display = 'block';
    document.getElementById('placeholder1').style.display = 'none';
  }
  
  if (data.img2) {
    document.getElementById('img2').src = data.img2;
    document.getElementById('img2').style.display = 'block';
    document.getElementById('placeholder2').style.display = 'none';
  }
  
  if (data.img3) {
    document.getElementById('img3').src = data.img3;
    document.getElementById('img3').style.display = 'block';
    document.getElementById('placeholder3').style.display = 'none';
  }
  
  if (data.map) {
    document.getElementById('mapImg').src = data.map;
    document.getElementById('mapImg').style.display = 'block';
    document.getElementById('mapPlaceholder').style.display = 'none';
  }
  
  updateNeeds();
  closeMenu();
  alert('Loaded: ' + name);
}

function deleteLocation(name) {
  if (confirm('Delete ' + name + '?')) {
    localStorage.removeItem('elec_' + name);
    loadLocations();
  }
}

function loadLocations() {
  const list = document.getElementById('locationsList');
  list.innerHTML = '';
  
  let found = false;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('elec_')) {
      found = true;
      const name = key.replace('elec_', '');
      const div = document.createElement('div');
      div.className = 'location-item';
      div.innerHTML = `
        <span onclick="loadLocation('${name}')">📍 ${name}</span>
        <span class="delete-btn" onclick="deleteLocation('${name}')">✕</span>
      `;
      list.appendChild(div);
    }
  }
  
  if (!found) {
    list.innerHTML = '<div style="text-align:center;color:#999;padding:20px">No saved locations</div>';
  }
}

// ===== MENU FUNCTIONS =====
function openMenu() {
  document.getElementById('menuModal').style.display = 'block';
  loadLocations();
}

function closeMenu() {
  document.getElementById('menuModal').style.display = 'none';
}

// ===== DOWNLOAD =====
function downloadImage() {
  alert('Download feature requires html2canvas library.\nTaking screenshot manually works too!');
}

// Initialize
setTimeout(updateNeeds, 100);
</script>
</body>
</html>
