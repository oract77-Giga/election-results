<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Poll</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial;
background:#f2f2f7;
margin:0;
padding:0;
}

header{
background:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:600;
border-bottom:1px solid #ddd;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.card{
background:white;
border-radius:16px;
padding:15px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
display:flex;
align-items:center;
justify-content:space-between;
}

.party{
display:flex;
align-items:center;
gap:10px;
}

.party img{
width:36px;
height:36px;
border-radius:8px;
object-fit:contain;
}

.voteBtn{
background:#007aff;
color:white;
border:none;
padding:8px 14px;
border-radius:10px;
font-size:14px;
}

.voteBtn:active{
transform:scale(.96);
}

.resultBar{
height:8px;
background:#e5e5ea;
border-radius:10px;
margin-top:5px;
overflow:hidden;
}

.resultFill{
height:100%;
background:#007aff;
width:0%;
}

.percent{
font-size:13px;
color:#555;
}

.exportBtn{
margin-top:20px;
width:100%;
background:black;
color:white;
border:none;
padding:14px;
border-radius:14px;
font-size:16px;
}

footer{
text-align:center;
font-size:12px;
color:#999;
margin-top:25px;
}

</style>
</head>

<body>

<header>Election Poll</header>

<div class="container" id="pollContainer">

</div>

<button class="exportBtn" onclick="exportResults()">Export Result</button>

<footer>Mobile Poll System</footer>

<script>

const parties=[
{
name:"Congress",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Nepali_Congress_flag.svg/512px-Nepali_Congress_flag.svg.png",
votes:0
},
{
name:"UML",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/CPN-UML_flag.svg/512px-CPN-UML_flag.svg.png",
votes:0
},
{
name:"Maoist",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/CPN-Maoist_Centre_flag.svg/512px-CPN-Maoist_Centre_flag.svg.png",
votes:0
},
{
name:"RSP",
logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Rastriya_Swatantra_Party_flag.svg/512px-Rastriya_Swatantra_Party_flag.svg.png",
votes:0
}
]

function renderPoll(){

const container=document.getElementById("pollContainer")
container.innerHTML=""

let totalVotes=parties.reduce((a,b)=>a+b.votes,0)

parties.forEach((party,i)=>{

let percent=totalVotes===0?0:((party.votes/totalVotes)*100).toFixed(1)

container.innerHTML+=`

<div class="card">

<div class="party">
<img src="${party.logo}">
<div>
<div>${party.name}</div>
<div class="percent">${percent}%</div>
<div class="resultBar">
<div class="resultFill" style="width:${percent}%"></div>
</div>
</div>
</div>

<button class="voteBtn" onclick="vote(${i})">Vote</button>

</div>

`

})

}

function vote(i){

parties[i].votes++

localStorage.setItem("pollData",JSON.stringify(parties))

renderPoll()

}

function loadData(){

let saved=localStorage.getItem("pollData")

if(saved){

let data=JSON.parse(saved)

data.forEach((p,i)=>{
parties[i].votes=p.votes
})

}

}

function exportResults(){

let text="Election Result\n\n"

parties.forEach(p=>{
text+=p.name+" : "+p.votes+" votes\n"
})

let blob=new Blob([text],{type:"text/plain"})

let link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="result.txt"
link.click()

}

loadData()
renderPoll()

</script>

</body>
</html>
