  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Election Results - Fixed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e9e9ec;font-family:Arial,sans-serif;display:flex;justify-content:center}
.wrapper{width:100%;max-width:430px;background:#f2f2f4;padding:15px}

/* HEADER */
.top{display:flex;justify-content:space-between;margin-bottom:15px}
h1{font-size:22px;color:#000}
#clock{background:#ddd;padding:5px 10px;border-radius:20px;font-size:14px}

/* ADDRESS */
.address-box{background:white;border-radius:15px;padding:10px;margin-bottom:15px}
.addr-inp{width:100%;border:none;padding:5px;font-size:14px}

hr{margin:10px 0;border-color:#ccc}

/* CARDS */
.cards{display:flex;gap:5px;margin-bottom:15px}
.card{flex:1;background:white;border-radius:15px;padding:10px 3px;text-align:center;position:relative}
.rank{position:absolute;top:5px;left:5px;background:gold;padding:2px 6px;border-radius:10px;font-size:10px;color:white}
.gold .rank{background:#b38a3b}
.silver .rank{background:#8e8e93}
.bronze .rank{background:#9b5e2a}

/* PHOTO */
.photo-wrap{width:60px;height:60px;margin:20px auto 5px;position:relative}
.ring-bg{width:100%;height:100%;border-radius:50%;padding:3px}
.gold-ring{background:linear-gradient(45deg,gold,#ffe68f)}
.silver-ring{background:linear-gradient(45deg,silver,white)}
.bronze-ring{background:linear-gradient(45deg,#cd7f32,#f2c18d)}
.circle{width:100%;height:100%;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.circle img{width:100%;height:100%;object-fit:cover;display:none}
.plus{font-size:20px;color:#999}
.photo-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
.loading-spinner{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.8);border-radius:50%;justify-content:center;align-items:center;font-size:12px}

.divider{height:1px;background:#ddd;margin:8px 0}

/* TEXT INPUTS */
.ci{width:100%;border:none;text-align:center;padding:3px 0;font-size:12px;background:transparent}
.cn{font-weight:bold}
.cp{font-size:10px}
.cv{font-size:14px;font-weight:bold}
.gt{color:#b38a3b}
.st{color:#555}
.bt{color:#9b5e2a}

/* NEEDS BOX */
.needs-box{background:white;border-radius:15px;padding:10px;margin:15px 0}
.needs-hdr{background:#333;color:white;padding:5px;border-radius:10px;margin-bottom:10px;font-size:11px}
.needs-row{display:flex;align-items:center;padding:8px 5px;border-bottom:1px solid #eee}
.ndot{width:20px;height:20px;border-radius:50%;background:gray;color:white;display:flex;align-items:center;justify-content:center;font-size:9px;margin-right:8px}
.ndot.silver{background:#8e8e93}
.ndot.bronze{background:#9b5e2a}
.nname{flex:1;font-size:12px}
.nright{text-align:right}
.nnum{font-weight:bold;font-size:14px}
.nlbl{font-size:8px;color:#999}

/* MAP */
.map-box{background:white;border-radius:15px;padding:15px;margin:15px 0}
.map-title{text-align:center;font-size:12px;margin-bottom:10px}
.map-container{width:100%;height:150px;background:#f0f0f0;border-radius:10px;position:relative;overflow:hidden;touch-action:none}
.map-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.map-ph-plus{font-size:40px;color:#999}
.map-ph-hint{font-size:10px;color:#999}
#mapImg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none;touch-action:none}
#mapFile{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.map-controls{display:none;gap:5px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.map-btn{padding:5px 10px;background:#f0f0f0;border:none;border-radius:20px;font-size:11px}

/* SAVE MENU */
.menu-btn{width:100%;padding:10px;background:#007aff;color:white;border:none;border-radius:25px;margin-bottom:10px;font-size:14px}
.menu-btn:active{opacity:0.8}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}
.modal-content{background:white;width:90%;max-width:380px;margin:50px auto;border-radius:20px;padding:20px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:bold;margin-bottom:15px}
.location-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #eee}
.location-item span:first-child{cursor:pointer;flex:1}
.delete-btn{color:red;padding:0 5px;font-size:18px;cursor:pointer}
.delete-btn:active{opacity:0.6}
.empty-list{text-align:center;color:#999;padding:20px}
.storage-warning{color:#ff3b30;font-size:12px;margin-top:5px;display:none}

/* DOWNLOAD */
#dlBtn{width:100%;padding:15px;background:black;color:white;border:none;border-radius:30px;font-size:16px;margin-top:10px}
#dlBtn:disabled{opacity:0.5}
.toast{position:fixed;bottom:20px;left:20px;right:20px;background:#333;color:white;padding:10px;border-radius:10px;text-align:center;z-index:2000;display:none;max-width:430px;margin:0 auto}
</style>
</head>
<body>
<div class="wrapper">
 <div id="toast" class="toast"></div>

 <!-- CAPTURE AREA -->
 <div id="captureArea">

  <!-- ADDRESS -->

  <hr>

  <!-- CARDS with data attributes to preserve original values -->

     <input type="file" accept="image/*" class="photo-input" data-card="3">

    <input class="ci cv bt" id="votes3" placeholder="Votes" value="9850" inputmode="numeric">
   </div>

  <!-- NEEDS TO WIN -->
  <div class="needs-box">
   <div class="needs-hdr">🗳 VOTES NEEDED TO WIN</div>
   <div class="needs-row">

    <div class="nname" id="needName2">LISA M.</div>

   </div>
   <div class="needs-row">
    <div class="ndot bronze">3</div>
    <div class="nname" id="needName3">JAMES K.</div>
    <div class="nright"><span class="nnum" id="needVotes3">0</span><div class="nlbl">needed</div></div>
   </div>
  </div>

  <!-- MAP -->
  <div class="map-box">
   <div class="map-title">🗺 REGION MAP</div>
   <div class="map-container" id="mapContainer">
    <div class="map-ph" id="mapPH">
     <div class="map-ph-plus">+</div>
     <div class="map-ph-hint">Tap to add map</div>

   <div class="map-controls" id="mapControls">

 </div>

 <!-- SAVE MENU BUTTON -->
 <button class="menu-btn" id="menuBtn">📋 LOCATIONS MENU</button>
 <button id="dlBtn">⬇ DOWNLOAD JPG</button>

 <!-- MODAL -->
 <div class="modal" id="menuModal">
  <div class="modal-content">
   <div class="modal-title">Saved Locations</div>

   <input type="text" id="locName" placeholder="New location name" style="width:100%;padding:8px;margin:10px 0;border-radius:10px;border:1px solid #ddd">
   <button class="menu-btn" id="saveLocationBtn">💾 SAVE CURRENT</button>
   <button class="menu-btn" style="background:#666;margin-top:5px" id="closeMenuBtn">CLOSE</button>
  </div>
 </div>

<script>
// Prevent zoom on double tap
document.addEventListener('touchstart', (e) => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// ===== TOAST NOTIFICATION =====
function showToast(msg, duration = 2000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, duration);
}

// ===== CLOCK =====
function updateClock() {
  const d = new Date();
  document.getElementById('clock').innerText = 
    d.getHours().toString().padStart(2,'0') + ':' +
    d.getMinutes().toString().padStart(2,'0') + ':' +
    d.getSeconds().toString().padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ===== COMPRESS IMAGE =====
function compressImage(file, maxSize = 100 * 1024) { // 100KB max
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        
        // Max dimensions
        if (width > height) {
          if (width > 300) {
            height *= 300 / width;
            width = 300;
          }
        } else {
          if (height > 300) {
            width *= 300 / height;
            height = 300;
          }
        }
        
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // Compress
        let quality = 0.7;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        
        // Reduce quality if still too large
        while (dataUrl.length > maxSize && quality > 0.1) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== PHOTO UPLOAD =====
document.querySelectorAll('.photo-input').forEach(input => {
  input.addEventListener('change', async function(e) {
    const cardNum = this.dataset.card;
    const file = this.files[0];
    if (!file) return;
    
    // Validate file type
    if (!file.type.startsWith('image/')) {
      showToast('Please select an image file');
      return;
    }
    
    const spinner = document.getElementById(`spinner${cardNum}`);
    const img = document.getElementById(`img${cardNum}`);
    const circle = document.getElementById(`circle${cardNum}`);
    
    try {
      spinner.style.display = 'flex';
      
      // Compress image
      const compressedDataUrl = await compressImage(file);
      
      img.src = compressedDataUrl;
      img.style.display = 'block';
      circle.querySelector('.plus').style.display = 'none';
      
      showToast('Photo uploaded');
    } catch (error) {
      showToast('Failed to upload image');
      console.error(error);
    } finally {
      spinner.style.display = 'none';
      // Clear input
      this.value = '';
    }
  });
});

// ===== GET VOTE NUMBERS =====
function getVote(id) {
  const val = document.getElementById(id).value;
  const num = parseInt(val.replace(/[^0-9]/g, ''));
  return isNaN(num) ? 0 : num;
}

// ===== FORMAT NUMBER =====
function formatNumber(num) {
  return num.toLocaleString();
}

// ===== UPDATE NEEDS ONLY (doesn't reorder cards) =====
function updateNeeds() {
  // Get current votes without reordering
  const votes = [
    getVote('votes1'),
    getVote('votes2'),
    getVote('votes3')
  ];
  
  const names = [
    document.getElementById('name1').value || 'Candidate 1',
    document.getElementById('name2').value || 'Candidate 2',
    document.getElementById('name3').value || 'Candidate 3'
  ];
  
  // Create array of objects
  const candidates = votes.map((votes, index) => ({
    votes,
    name: names[index],
    originalIndex: index
  }));
  
  // Sort by votes
  candidates.sort((a, b) => b.votes - a.votes);
  
  // Update needs box with sorted data but don't reorder cards
  document.getElementById('needName2').innerText = candidates[1].name;
  document.getElementById('needName3').innerText = candidates[2].name;
  
  const need2 = Math.max(0, candidates[0].votes - candidates[1].votes + 1);
  const need3 = Math.max(0, candidates[0].votes - candidates[2].votes + 1);
  
  document.getElementById('needVotes2').innerText = formatNumber(need2);
  document.getElementById('needVotes3').innerText = formatNumber(need3);
}

// Add input listeners for real-time updates
['votes1', 'votes2', 'votes3', 'name1', 'name2', 'name3'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateNeeds);
});

// ===== MAP FUNCTIONS =====
let mapScale = 1;
let mapX = 0;
let mapY = 0;
let mapInitialized = false;

function initializeMap() {
  if (mapInitialized) return;
  
  const mapImg = document.getElementById('mapImg');
  const mapContainer = document.getElementById('mapContainer');
  const mapFile = document.getElementById('mapFile');
  const mapPH = document.getElementById('mapPH');
  const mapControls = document.getElementById('mapControls');
  
  // File upload
  mapFile.addEventListener('change', async function(e) {
    const file = this.files[0];
    if (!file) return;
    
    if (!file.type.startsWith('image/')) {
      showToast('Please select an image');
      return;
    }
    
    try {
      const compressedDataUrl = await compressImage(file, 200 * 1024); // 200KB max for maps
      mapImg.src = compressedDataUrl;
      mapImg.style.display = 'block';
      mapPH.style.display = 'none';
      mapControls.style.display = 'flex';
      resetMapTransform();
      showToast('Map uploaded');
    } catch (error) {
      showToast('Failed to upload map');
      console.error(error);
    } finally {
      this.value = '';
    }
  });
  
  // Touch events with proper cleanup
  let touchStartX, touchStartY, touchStartDistance;
  let isDragging = false;
  
  mapContainer.addEventListener('touchstart', (e) => {
    if (!mapImg.src) return;
    e.preventDefault();
    
    if (e.touches.length === 2) {
      // Pinch zoom
      touchStartDistance = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    } else if (e.touches.length === 1) {
      // Pan
      isDragging = true;
      touchStartX = e.touches[0].clientX - mapX;
      touchStartY = e.touches[0].clientY - mapY;
    }
  });
  
  mapContainer.addEventListener('touchmove', (e) => {
    if (!mapImg.src) return;
    e.preventDefault();
    
    if (e.touches.length === 2) {
      // Pinch zoom
      const currentDistance = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      
      if (touchStartDistance) {
        const scale = currentDistance / touchStartDistance;
        mapScale = Math.max(0.5, Math.min(3, mapScale * scale));
        updateMapTransform();
      }
      touchStartDistance = currentDistance;
    } else if (e.touches.length === 1 && isDragging) {
      // Pan
      mapX = e.touches[0].clientX - touchStartX;
      mapY = e.touches[0].clientY - touchStartY;
      updateMapTransform();
    }
  });
  
  mapContainer.addEventListener('touchend', (e) => {
    isDragging = false;
    touchStartDistance = null;
  });
  
  // Button controls
  document.getElementById('zoomIn').addEventListener('click', () => {
    mapScale = Math.min(3, mapScale + 0.2);
    updateMapTransform();
  });
  
  document.getElementById('zoomOut').addEventListener('click', () => {
    mapScale = Math.max(0.5, mapScale - 0.2);
    updateMapTransform();
  });
  
  document.getElementById('resetMap').addEventListener('click', resetMapTransform);
  
  mapInitialized = true;
}

function updateMapTransform() {
  const mapImg = document.getElementById('mapImg');
  mapImg.style.transform = `translate(${mapX}px, ${mapY}px) scale(${mapScale})`;
}

function resetMapTransform() {
  mapScale = 1;
  mapX = 0;
  mapY = 0;
  updateMapTransform();
}

// Initialize map
initializeMap();

// ===== SAVE MENU =====
function openMenu() {
  document.getElementById('menuModal').style.display = 'block';
  loadLocations();
  checkStorageQuota();
}

function closeMenu() {
  document.getElementById('menuModal').style.display = 'none';
}

function checkStorageQuota() {
  // Rough estimation - localStorage limit is ~5MB
  let totalSize = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    totalSize += (localStorage.getItem(key)?.length || 0) * 2; // Approx bytes
  }
  
  const warning = document.getElementById('storageWarning');
  if (totalSize > 4 * 1024 * 1024) { // 4MB
    warning.style.display = 'block';
  } else {
    warning.style.display = 'none';
  }
}

function loadLocations() {
  const list = document.getElementById('locationsList');
  list.innerHTML = '';
  
  let hasItems = false;
  
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('election_')) {
      hasItems = true;
      try {
        const data = JSON.parse(localStorage.getItem(key));
        const name = key.replace('election_', '');
        
        const div = document.createElement('div');
        div.className = 'location-item';
        div.innerHTML = `
          <span onclick="loadLocation('${name.replace(/'/g, "\\'")}')">📍 ${name}</span>
          <span class="delete-btn" onclick="deleteLocation('${name.replace(/'/g, "\\'")}', event)">✕</span>
        `;
        list.appendChild(div);
      } catch (e) {
        // Remove corrupted data
        localStorage.removeItem(key);
      }
    }
  }
  
  if (!hasItems) {
    const empty = document.createElement('div');
    empty.className = 'empty-list';
    empty.innerText = 'No saved locations';
    list.appendChild(empty);
  }
}

async function saveLocation() {
  const name = document.getElementById('locName').value.trim();
  if (!name) {
    showToast('Enter a location name');
    return;
  }
  
  // Show saving indicator
  const saveBtn = document.getElementById('saveLocationBtn');
  const originalText = saveBtn.innerText;
  saveBtn.i
