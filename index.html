<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Election Results - WORKING</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e9e9ec;font-family:Arial,sans-serif;display:flex;justify-content:center}
.wrapper{width:100%;max-width:430px;background:#f2f2f4;padding:15px}

/* HEADER */
.top{display:flex;justify-content:space-between;margin-bottom:15px}
h1{font-size:22px}
#clock{background:#ddd;padding:5px 10px;border-radius:15px}

/* ADDRESS */
.address-box{background:white;border-radius:10px;padding:10px;margin-bottom:10px}
.addr-inp{width:100%;border:none;padding:5px}

hr{margin:10px 0}

/* CARDS */
.cards{display:flex;gap:5px;margin-bottom:10px}
.card{flex:1;background:white;border-radius:10px;padding:10px 2px;text-align:center}
.rank{background:gold;color:white;padding:2px;border-radius:5px;font-size:10px;margin-bottom:5px}

/* PHOTO */
.photo-wrap{width:60px;height:60px;margin:5px auto;position:relative}
.circle{width:100%;height:100%;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;overflow:hidden}
.circle img{width:100%;height:100%;object-fit:cover;display:none}
.plus{font-size:20px;color:#999}
.photo-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}

.divider{height:1px;background:#ddd;margin:5px 0}

/* INPUTS */
.ci{width:100%;border:none;text-align:center;padding:3px;font-size:12px;background:transparent}
.gt{color:#b38b3a}
.st{color:#555}
.bt{color:#9b5e2a}

/* NEEDS */
.needs-box{background:white;border-radius:10px;padding:10px;margin:10px 0}
.needs-row{display:flex;padding:5px 0}
.ndot{width:20px;height:20px;border-radius:50%;background:gray;color:white;display:flex;align-items:center;justify-content:center;margin-right:5px}
.nname{flex:1}

/* MAP */
.map-box{background:white;border-radius:10px;padding:10px;margin:10px 0}
.map-container{width:100%;height:120px;background:#eee;border-radius:10px;position:relative}
.map-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#mapImg{width:100%;height:100%;object-fit:contain;display:none}
#mapFile{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.map-controls{display:flex;gap:5px;justify-content:center;margin-top:5px}
.map-btn{padding:5px 10px;background:#ddd;border:none;border-radius:15px}

/* BUTTONS */
.menu-btn{width:100%;padding:12px;background:#007aff;color:white;border:none;border-radius:20px;margin:5px 0}
#dlBtn{width:100%;padding:12px;background:black;color:white;border:none;border-radius:20px;margin:5px 0}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5)}
.modal-content{background:white;width:90%;margin:50px auto;padding:20px;border-radius:15px}
</style>
</head>
<body>
<div class="wrapper">

 <!-- CAPTURE AREA -->
 <div id="captureArea">
  <div class="top">
   <h1>Election Results</h1>
   <div id="clock">--:--:--</div>
  </div>

  <!-- ADDRESS -->
  <div class="address-box">
   <input class="addr-inp" id="address" placeholder="Venue...">
  </div>

  <hr>

  <!-- CARDS -->
  <div class="cards">
   <!-- CARD 1 -->
   <div class="card" id="card1">
    <div class="rank" style="background:#b38b3a">1st</div>
    <div class="photo-wrap">
     <div class="circle" id="circle1">
      <span class="plus">+</span>
      <img id="img1">
     </div>
     <input type="file" class="photo-input" id="file1" onchange="uploadPhoto(1)">
    </div>
    <div class="divider"></div>
    <input class="ci gt" id="name1" value="THOMAS F." onkeyup="updateAll()">
    <input class="ci gt" id="party1" value="PROGRESS" onkeyup="updateAll()">
    <input class="ci gt" id="votes1" value="14250" onkeyup="updateAll()">
   </div>

   <!-- CARD 2 -->
   <div class="card" id="card2">
    <div class="rank" style="background:#8e8e93">2nd</div>
    <div class="photo-wrap">
     <div class="circle" id="circle2">
      <span class="plus">+</span>
      <img id="img2">
     </div>
     <input type="file" class="photo-input" id="file2" onchange="uploadPhoto(2)">
    </div>
    <div class="divider"></div>
    <input class="ci st" id="name2" value="LISA M." onkeyup="updateAll()">
    <input class="ci st" id="party2" value="UNITY" onkeyup="updateAll()">
    <input class="ci st" id="votes2" value="11230" onkeyup="updateAll()">
   </div>

   <!-- CARD 3 -->
   <div class="card" id="card3">
    <div class="rank" style="background:#9b5e2a">3rd</div>
    <div class="photo-wrap">
     <div class="circle" id="circle3">
      <span class="plus">+</span>
      <img id="img3">
     </div>
     <input type="file" class="photo-input" id="file3" onchange="uploadPhoto(3)">
    </div>
    <div class="divider"></div>
    <input class="ci bt" id="name3" value="JAMES K." onkeyup="updateAll()">
    <input class="ci bt" id="party3" value="HORIZON" onkeyup="updateAll()">
    <input class="ci bt" id="votes3" value="9850" onkeyup="updateAll()">
   </div>
  </div>

  <!-- NEEDS BOX -->
  <div class="needs-box">
   <div style="background:#333;color:white;padding:5px;margin-bottom:5px">VOTES NEEDED</div>
   <div class="needs-row">
    <div class="ndot" style="background:#8e8e93">2</div>
    <div class="nname" id="needName2">LISA M.</div>
    <div><span id="needVotes2">0</span> needed</div>
   </div>
   <div class="needs-row">
    <div class="ndot" style="background:#9b5e2a">3</div>
    <div class="nname" id="needName3">JAMES K.</div>
    <div><span id="needVotes3">0</span> needed</div>
   </div>
  </div>

  <!-- MAP -->
  <div class="map-box">
   <div style="text-align:center;margin-bottom:5px">MAP</div>
   <div class="map-container">
    <div class="map-ph" id="mapPH">➕ Tap to add map</div>
    <img id="mapImg">
    <input type="file" id="mapFile" onchange="uploadMap()">
   </div>
   <div class="map-controls" id="mapControls" style="display:none">
    <button class="map-btn" onclick="mapZoom(0.2)">+</button>
    <button class="map-btn" onclick="mapZoom(-0.2)">-</button>
    <button class="map-btn" onclick="resetMap()">↺</button>
   </div>
  </div>
 </div>

 <!-- BUTTONS -->
 <button class="menu-btn" onclick="openMenu()">📋 LOCATIONS</button>
 <button id="dlBtn" onclick="downloadImage()">⬇ DOWNLOAD</button>

 <!-- MODAL -->
 <div class="modal" id="menuModal">
  <div class="modal-content">
   <h3>Saved Locations</h3>
   <div id="locationsList"></div>
   <input type="text" id="locName" placeholder="New name" style="width:100%;padding:8px;margin:10px 0">
   <button class="menu-btn" onclick="saveLocation()">SAVE CURRENT</button>
   <button class="menu-btn" style="background:#666" onclick="closeMenu()">CLOSE</button>
  </div>
 </div>
</div>

<script>
// ===== CLOCK =====
function updateClock() {
  let d = new Date();
  document.getElementById('clock').innerHTML = 
    d.getHours().toString().padStart(2,'0') + ':' +
    d.getMinutes().toString().padStart(2,'0') + ':' +
    d.getSeconds().toString().padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ===== PHOTO UPLOAD =====
function uploadPhoto(num) {
  let file = document.getElementById('file' + num);
  let img = document.getElementById('img' + num);
  let circle = document.getElementById('circle' + num);
  
  if(file.files && file.files[0]) {
    let reader = new FileReader();
    reader.onload = function(e) {
      img.src = e.target.result;
      img.style.display = 'block';
      circle.querySelector('.plus').style.display = 'none';
    }
    reader.readAsDataURL(file.files[0]);
  }
}

// ===== GET VOTES =====
function getVote(id) {
  let val = document.getElementById(id).value;
  return parseInt(val.replace(/[^0-9]/g,'')) || 0;
}

// ===== UPDATE ALL =====
function updateAll() {
  // Get current values
  let c1 = {
    name: document.getElementById('name1').value,
    party: document.getElementById('party1').value,
    votes: getVote('votes1'),
    img: document.getElementById('img1').src
  };
  
  let c2 = {
    name: document.getElementById('name2').value,
    party: document.getElementById('party2').value,
    votes: getVote('votes2'),
    img: document.getElementById('img2').src
  };
  
  let c3 = {
    name: document.getElementById('name3').value,
    party: document.getElementById('party3').value,
    votes: getVote('votes3'),
    img: document.getElementById('img3').src
  };
  
  // Sort by votes
  let sorted = [c1, c2, c3].sort((a,b) => b.votes - a.votes);
  
  // Update display
  document.getElementById('name1').value = sorted[0].name;
  document.getElementById('party1').value = sorted[0].party;
  document.getElementById('votes1').value = sorted[0].votes;
  
  document.getElementById('name2').value = sorted[1].name;
  document.getElementById('party2').value = sorted[1].party;
  document.getElementById('votes2').value = sorted[1].votes;
  
  document.getElementById('name3').value = sorted[2].name;
  document.getElementById('party3').value = sorted[2].party;
  document.getElementById('votes3').value = sorted[2].votes;
  
  // Update needs
  document.getElementById('needName2').innerHTML = sorted[1].name;
  document.getElementById('needName3').innerHTML = sorted[2].name;
  
  let need2 = Math.max(0, sorted[0].votes - sorted[1].votes + 1);
  let need3 = Math.max(0, sorted[0].votes - sorted[2].votes + 1);
  
  document.getElementById('needVotes2').innerHTML = need2;
  document.getElementById('needVotes3').innerHTML = need3;
  
  // Update photos
  if(sorted[0].img) {
    document.getElementById('img1').src = sorted[0].img;
    document.getElementById('img1').style.display = 'block';
    document.querySelector('#circle1 .plus').style.display = 'none';
  }
  if(sorted[1].img) {
    document.getElementById('img2').src = sorted[1].img;
    document.getElementById('img2').style.display = 'block';
    document.querySelector('#circle2 .plus').style.display = 'none';
  }
  if(sorted[2].img) {
    document.getElementById('img3').src = sorted[2].img;
    document.getElementById('img3').style.display = 'block';
    document.querySelector('#circle3 .plus').style.display = 'none';
  }
}

// ===== MAP =====
let mapScale = 1;
let mapX = 0;
let mapY = 0;

function uploadMap() {
  let file = document.getElementById('mapFile');
  if(file.files && file.files[0]) {
    let reader = new FileReader();
    reader.onload = function(e) {
      let img = document.getElementById('mapImg');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('mapPH').style.display = 'none';
      document.getElementById('mapControls').style.display = 'flex';
    }
    reader.readAsDataURL(file.files[0]);
  }
}

function updateMapTransform() {
  document.getElementById('mapImg').style.transform = 
    'translate(' + mapX + 'px,' + mapY + 'px) scale(' + mapScale + ')';
}

function mapZoom(d) {
  mapScale = Math.max(0.5, Math.min(3, mapScale + d));
  updateMapTransform();
}

function resetMap() {
  mapScale = 1;
  mapX = 0;
  mapY = 0;
  updateMapTransform();
}

// Touch
let drag = false;
let startX, startY;
let map = document.getElementById('mapImg');

map.addEventListener('touchstart', function(e) {
  if(!this.src) return;
  drag = true;
  startX = e.touches[0].clientX - mapX;
  startY = e.touches[0].clientY - mapY;
  e.preventDefault();
});

map.addEventListener('touchmove', function(e) {
  if(!drag) return;
  mapX = e.touches[0].clientX - startX;
  mapY = e.touches[0].clientY - startY;
  updateMapTransform();
  e.preventDefault();
});

map.addEventListener('touchend', function() {
  drag = false;
});

// ===== SAVE MENU =====
function openMenu() {
  document.getElementById('menuModal').style.display = 'block';
  loadList();
}

function closeMenu() {
  document.getElementById('menuModal').style.display = 'none';
}

function loadList() {
  let list = document.getElementById('locationsList');
  list.innerHTML = '';
  
  for(let i = 0; i < localStorage.length; i++) {
    let key = localStorage.key(i);
    if(key.startsWith('vote_')) {
      let name = key.replace('vote_', '');
      list.innerHTML += '<div style="padding:5px;border-bottom:1px solid #ddd">' +
        '<span onclick="loadLocation(\'' + name + '\')">📍 ' + name + '</span> ' +
        '<span style="color:red;float:right" onclick="deleteLocation(\'' + name + '\')">✕</span>' +
        '</div>';
    }
  }
}

function saveLocation() {
  let name = document.getElementById('locName').value;
  if(!name) return alert('Enter name');
  
  let data = {
    n1: document.getElementById('name1').value,
    p1: document.getElementById('party1').value,
    v1: document.getElementById('votes1').value,
    i1: document.getElementById('img1').src,
    n2: document.getElementById('name2').value,
    p2: document.getElementById('party2').value,
    v2: document.getElementById('votes2').value,
    i2: document.getElementById('img2').src,
    n3: document.getElementById('name3').value,
    p3: document.getElementById('party3').value,
    v3: document.getElementById('votes3').value,
    i3: document.getElementById('img3').src,
    map: document.getElementById('mapImg').src,
    addr: document.getElementById('address').value
  };
  
  localStorage.setItem('vote_' + name, JSON.stringify(data));
  document.getElementById('locName').value = '';
  loadList();
}

function loadLocation(name) {
  let data = JSON.parse(localStorage.getItem('vote_' + name));
  
  document.getElementById('name1').value = data.n1;
  document.getElementById('party1').value = data.p1;
  document.getElementById('votes1').value = data.v1;
  document.getElementById('name2').value = data.n2;
  document.getElementById('party2').value = data.p2;
  document.getElementById('votes2').value = data.v2;
  document.getElementById('name3').value = data.n3;
  document.getElementById('party3').value = data.p3;
  document.getElementById('votes3').value = data.v3;
  
  if(data.i1) {
    document.getElementById('img1').src = data.i1;
    document.getElementById('img1').style.display = 'block';
    document.querySelector('#circle1 .plus').style.display = 'none';
  }
  if(data.i2) {
    document.getElementById('img2').src = data.i2;
    document.getElementById('img2').style.display = 'block';
    document.querySelector('#circle2 .plus').style.display = 'none';
  }
  if(data.i3) {
    document.getElementById('img3').src = data.i3;
    document.getElementById('img3').style.display = 'block';
    document.querySelector('#circle3 .plus').style.display = 'none';
  }
  
  if(data.map) {
    document.getElementById('mapImg').src = data.map;
    document.getElementById('mapImg').style.display = 'block';
    document.getElementById('mapPH').style.display = 'none';
    document.getElementById('mapControls').style.display = 'flex';
  }
  
  document.getElementById('address').value = data.addr || '';
  
  closeMenu();
  updateAll();
}

function deleteLocation(name) {
  localStorage.removeItem('vote_' + name);
  loadList();
}

// ===== DOWNLOAD =====
function downloadImage() {
  let btn = document.getElementById('dlBtn');
  let ctrls = document.getElementById('mapControls');
  let was = ctrls.style.display;
  
  ctrls.style.display = 'none';
  btn.innerHTML = 'Please wait...';
  
  html2canvas(document.getElementById('captureArea'), {
    scale: 2,
    backgroundColor: '#f2f2f4'
  }).then(canvas => {
    ctrls.style.display = was;
    btn.innerHTML = '⬇ DOWNLOAD';
    
    let link = document.createElement('a');
    link.download = 'election.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  });
}

// Initial update
setTimeout(updateAll, 100);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
