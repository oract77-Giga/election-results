<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Election Update 2082</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#e9e9ec;font-family:Arial,sans-serif;display:flex;justify-content:center}
.wrapper{width:100%;max-width:430px;background:#f2f2f4;padding:15px}

/* HEADER */
.top{display:flex;justify-content:space-between;margin-bottom:15px}
h1{font-size:22px;color:#000}
#clock{background:#ddd;padding:5px 10px;border-radius:20px;font-size:14px;white-space:nowrap}

/* ADDRESS */
.address-box{background:white;border-radius:15px;padding:10px;margin-bottom:15px}
.addr-inp{width:100%;border:none;padding:8px 5px;font-size:14px;background:transparent;-webkit-appearance:none;appearance:none}

hr{margin:10px 0;border-color:#ccc}

/* ELECTION TITLE - NEW */
.election-title{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  margin:10px 0 15px;
  color:#000;
  letter-spacing:1px;
}
.election-title span{
  display:inline-block;
  border-bottom:2px solid #333;
  padding-bottom:5px;
}

/* PARTY LOGOS ROW - EXACT FORMAT */
.party-logos{
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:white;
  border-radius:20px;
  padding:20px 10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}
.logo-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.logo-circle{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#f0f0f0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  border:2px solid transparent;
}
.logo-circle.rsp{ border-color:#FF6B6B; }
.logo-circle.nc{ border-color:#4ECDC4; }
.logo-circle.uml{ border-color:#FFD93D; }
.logo-circle.rpp{ border-color:#6C5CE7; }

.logo-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}
.logo-circle .plus{
  font-size:24px;
  color:#999;
  display:flex;
}
.logo-input{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0;
  cursor:pointer;
  z-index:5;
}
.party-name{
  font-size:14px;
  font-weight:bold;
}
.party-name.rsp{ color:#FF6B6B; }
.party-name.nc{ color:#4ECDC4; }
.party-name.uml{ color:#FFD93D; }
.party-name.rpp{ color:#6C5CE7; }

/* SHARE DATE ROW */
.share-date{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  border-radius:20px;
  padding:12px 20px;
  margin:10px 0;
  font-size:16px;
}
.share-label{
  font-weight:bold;
  color:#333;
}
.date-value{
  color:#666;
  background:#f0f0f0;
  padding:5px 15px;
  border-radius:20px;
  font-size:14px;
}

/* VOTE BARS SECTION */
.vote-section{
  background:white;
  border-radius:20px;
  padding:20px;
  margin:10px 0;
}
.vote-row{
  display:flex;
  align-items:center;
  margin-bottom:20px;
  gap:10px;
}
.vote-row:last-child{ margin-bottom:0; }

.vote-party{
  width:50px;
  font-weight:bold;
  font-size:16px;
}
.vote-party.rsp{ color:#FF6B6B; }
.vote-party.nc{ color:#4ECDC4; }
.vote-party.uml{ color:#FFD93D; }
.vote-party.rpp{ color:#6C5CE7; }

.vote-bar-container{
  flex:1;
  height:40px;
  background:#f0f0f0;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}
.vote-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, #4CAF50, #45a049);
  border-radius:20px;
  transition:width 0.3s;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding-right:10px;
  color:white;
  font-weight:bold;
  font-size:14px;
  white-space:nowrap;
}
.vote-input{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0;
  cursor:pointer;
  z-index:5;
}
.vote-count{
  min-width:60px;
  text-align:right;
  font-weight:bold;
  font-size:14px;
}
.vote-count input{
  width:70px;
  border:1px solid #ddd;
  border-radius:15px;
  padding:5px 8px;
  text-align:center;
  font-size:14px;
  background:white;
  -webkit-appearance:none;
}

/* STATUS SECTION */
.status-section{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  border-radius:20px;
  padding:15px 20px;
  margin:10px 0;
  font-size:18px;
  font-weight:bold;
}
.status-proudly{ color:#FF6B6B; }
.status-confused{ color:#6C5CE7; }

/* MAP SECTION */
.map-box{background:white;border-radius:20px;padding:15px;margin:10px 0}
.map-title{text-align:center;font-size:14px;margin-bottom:10px;color:#666}
.map-container{width:100%;height:150px;background:#f0f0f0;border-radius:15px;position:relative;overflow:hidden}
.map-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.map-ph-plus{font-size:40px;color:#999}
.map-ph-hint{font-size:10px;color:#999}
#mapImg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none}
#mapFile{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:10}
.map-controls{display:flex;gap:5px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.map-btn{padding:8px 15px;background:#f0f0f0;border:none;border-radius:25px;font-size:12px;cursor:pointer}

/* SAVE MENU */
.menu-btn{
  width:100%;
  padding:15px;
  background:#007aff;
  color:white;
  border:none;
  border-radius:30px;
  margin:10px 0;
  font-size:16px;
  cursor:pointer;
  -webkit-appearance:none;
}
.menu-btn:active{opacity:0.8}

#dlBtn{
  width:100%;
  padding:15px;
  background:black;
  color:white;
  border:none;
  border-radius:30px;
  font-size:16px;
  margin-top:5px;
  cursor:pointer;
}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}
.modal-content{background:white;width:90%;max-width:380px;margin:50px auto;border-radius:25px;padding:20px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:20px;font-weight:bold;margin-bottom:15px}
.location-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.location-item:active{background:#f5f5f5}
.delete-btn{color:#ff3b30;padding:5px 15px;font-size:18px}
#locName{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:15px;
  border:1px solid #ddd;
  font-size:14px;
  -webkit-appearance:none;
}
.save-btn{
  background:#007aff;
  color:white;
  border:none;
  border-radius:25px;
  padding:12px;
  width:100%;
  font-size:14px;
  margin:5px 0;
  cursor:pointer;
}
.close-btn{
  background:#666;
  color:white;
  border:none;
  border-radius:25px;
  padding:12px;
  width:100%;
  font-size:14px;
  margin:5px 0;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="wrapper">

 <!-- CAPTURE AREA -->
 <div id="captureArea">

  <div class="top">
   <h1>Election Results</h1>
   <div id="clock">--:--:-- NPT</div>
  </div>

  <!-- ADDRESS -->
  <div class="address-box">
   <input class="addr-inp" id="addrInp" placeholder="Election venue...">
  </div>

  <hr>

  <!-- ELECTION TITLE 2082 -->
  <div class="election-title">
   <span>ELECTION UPDATE 2082</span>
  </div>

  <!-- PARTY LOGOS ROW - RSP, NC, UML, RPP -->
  <div class="party-logos">
   <!-- RSP -->
   <div class="logo-item">
    <div class="logo-circle rsp" id="logoRSP">
     <span class="plus" id="plusRSP">+</span>
     <img id="imgRSP">
     <input type="file" accept="image/*" class="logo-input" id="fileRSP" onchange="uploadPartyLogo('RSP')">
    </div>
    <div class="party-name rsp">RSP</div>
   </div>
   
   <!-- NC -->
   <div class="logo-item">
    <div class="logo-circle nc" id="logoNC">
     <span class="plus" id="plusNC">+</span>
     <img id="imgNC">
     <input type="file" accept="image/*" class="logo-input" id="fileNC" onchange="uploadPartyLogo('NC')">
    </div>
    <div class="party-name nc">NC</div>
   </div>
   
   <!-- UML -->
   <div class="logo-item">
    <div class="logo-circle uml" id="logoUML">
     <span class="plus" id="plusUML">+</span>
     <img id="imgUML">
     <input type="file" accept="image/*" class="logo-input" id="fileUML" onchange="uploadPartyLogo('UML')">
    </div>
    <div class="party-name uml">UML</div>
   </div>
   
   <!-- RPP -->
   <div class="logo-item">
    <div class="logo-circle rpp" id="logoRPP">
     <span class="plus" id="plusRPP">+</span>
     <img id="imgRPP">
     <input type="file" accept="image/*" class="logo-input" id="fileRPP" onchange="uploadPartyLogo('RPP')">
    </div>
    <div class="party-name rpp">RPP</div>
   </div>
  </div>

  <!-- SHARE DATE ROW -->
  <div class="share-date">
   <span class="share-label">공유 날짜:</span>
   <span class="date-value" id="shareDate">2082/01/15</span>
  </div>

  <!-- VOTE BARS SECTION -->
  <div class="vote-section">
   <!-- RSP -->
   <div class="vote-row">
    <div class="vote-party rsp">RSP</div>
    <div class="vote-bar-container" onclick="document.getElementById('votesRSP').click()">
     <div class="vote-bar" id="barRSP" style="width:75%">75%</div>
     <input type="file" accept="image/*" class="vote-input" id="votesRSP" onchange="updateVoteFromFile('RSP')" multiple>
    </div>
    <div class="vote-count">
     <input type="text" id="countRSP" value="75%" onkeyup="updateVoteBar('RSP')" placeholder="75%">
    </div>
   </div>
   
   <!-- NC -->
   <div class="vote-row">
    <div class="vote-party nc">NC</div>
    <div class="vote-bar-container" onclick="document.getElementById('votesNC').click()">
     <div class="vote-bar" id="barNC" style="width:45%">45%</div>
     <input type="file" accept="image/*" class="vote-input" id="votesNC" onchange="updateVoteFromFile('NC')" multiple>
    </div>
    <div class="vote-count">
     <input type="text" id="countNC" value="45%" onkeyup="updateVoteBar('NC')" placeholder="45%">
    </div>
   </div>
   
   <!-- UML -->
   <div class="vote-row">
    <div class="vote-party uml">UML</div>
    <div class="vote-bar-container" onclick="document.getElementById('votesUML').click()">
     <div class="vote-bar" id="barUML" style="width:30%">30%</div>
     <input type="file" accept="image/*" class="vote-input" id="votesUML" onchange="updateVoteFromFile('UML')" multiple>
    </div>
    <div class="vote-count">
     <input type="text" id="countUML" value="30%" onkeyup="updateVoteBar('UML')" placeholder="30%">
    </div>
   </div>
   
   <!-- RPP -->
   <div class="vote-row">
    <div class="vote-party rpp">RPP</div>
    <div class="vote-bar-container" onclick="document.getElementById('votesRPP').click()">
     <div class="vote-bar" id="barRPP" style="width:15%">15%</div>
     <input type="file" accept="image/*" class="vote-input" id="votesRPP" onchange="updateVoteFromFile('RPP')" multiple>
    </div>
    <div class="vote-count">
     <input type="text" id="countRPP" value="15%" onkeyup="updateVoteBar('RPP')" placeholder="15%">
    </div>
   </div>
  </div>

  <!-- PROUDLY CONFUSED SECTION -->
  <div class="status-section">
   <span class="status-proudly">proudly</span>
   <span class="status-confused">confused</span>
  </div>

  <!-- MAP -->
  <div class="map-box">
   <div class="map-title">🗺 REGION MAP</div>
   <div class="map-container">
    <div class="map-ph" id="mapPH">
     <div class="map-ph-plus">+</div>
     <div class="map-ph-hint">Tap to add map</div>
    </div>
    <img id="mapImg">
    <input type="file" accept="image/*" id="mapFile" onchange="uploadMap()">
   </div>
   <div class="map-controls" id="mapControls" style="display:none">
    <button class="map-btn" onclick="mapZoom(0.2)">➕</button>
    <button class="map-btn" onclick="mapZoom(-0.2)">➖</button>
    <button class="map-btn" onclick="resetMap()">⟲</button>
   </div>
  </div>

 </div> <!-- end capture -->

 <!-- SAVE MENU BUTTON -->
 <button class="menu-btn" onclick="openMenu()">📋 LOCATIONS MENU</button>
 <button id="dlBtn" onclick="downloadImage()">⬇ DOWNLOAD JPG</button>

 <!-- MODAL -->
 <div class="modal" id="menuModal" onclick="if(event.target===this) closeMenu()">
  <div class="modal-content" onclick="event.stopPropagation()">
   <div class="modal-title">Saved Locations</div>
   <div id="locationsList" style="min-height:50px;max-height:300px;overflow-y:auto;margin-bottom:10px"></div>
   <input type="text" id="locName" placeholder="New location name">
   <button class="save-btn" onclick="saveLocation()">💾 SAVE CURRENT</button>
   <button class="close-btn" onclick="closeMenu()">CLOSE</button>
  </div>
 </div>
</div>

<script>
// ===== NEPAL TIME =====
function updateClock() {
  const d = new Date();
  const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
  const nepaliTime = new Date(utc + (3600000 * 5) + (2700000));
  
  let hours = nepaliTime.getHours();
  const minutes = nepaliTime.getMinutes().toString().padStart(2,'0');
  const seconds = nepaliTime.getSeconds().toString().padStart(2,'0');
  
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  hours = hours ? hours : 12;
  
  document.getElementById('clock').innerText = 
    `${hours.toString().padStart(2,'0')}:${minutes}:${seconds} ${ampm} NPT`;
}
setInterval(updateClock, 1000);
updateClock();

// ===== PARTY LOGO UPLOAD =====
function uploadPartyLogo(party) {
  const fileInput = document.getElementById('file' + party);
  const img = document.getElementById('img' + party);
  const plus = document.getElementById('plus' + party);
  
  if(fileInput.files && fileInput.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      img.src = e.target.result;
      img.style.display = 'block';
      if (plus) plus.style.display = 'none';
    }
    reader.readAsDataURL(fileInput.files[0]);
  }
}

// ===== VOTE BAR FUNCTIONS =====
function updateVoteBar(party) {
  const input = document.getElementById('count' + party);
  const bar = document.getElementById('bar' + party);
  let val = input.value.replace(/[^0-9]/g, '');
  val = Math.min(100, Math.max(0, parseInt(val) || 0));
  bar.style.width = val + '%';
  bar.innerText = val + '%';
  input.value = val + '%';
}

function updateVoteFromFile(party) {
  // This function is triggered when vote bar is clicked
  // You can customize what happens when file input is used
  console.log('Vote bar clicked for ' + party);
}

// ===== MAP FUNCTIONS =====
let mapScale = 1;
let mapX = 0;
let mapY = 0;

function uploadMap() {
  const file = document.getElementById('mapFile');
  if(file.files && file.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById('mapImg');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('mapPH').style.display = 'none';
      document.getElementById('mapControls').style.display = 'flex';
      mapScale = 1;
      mapX = 0;
      mapY = 0;
      updateMapTransform();
    }
    reader.readAsDataURL(file.files[0]);
  }
}

function updateMapTransform() {
  document.getElementById('mapImg').style.transform = 
    `translate(${mapX}px, ${mapY}px) scale(${mapScale})`;
}

function mapZoom(delta) {
  mapScale = Math.max(0.5, Math.min(3, mapScale + delta));
  updateMapTransform();
}

function resetMap() {
  mapScale = 1;
  mapX = 0;
  mapY = 0;
  updateMapTransform();
}

// Touch events for map
document.getElementById('mapImg').addEventListener('touchstart', function(e) {
  if(!this.src) return;
  dragging = true;
  startX = e.touches[0].clientX - mapX;
  startY = e.touches[0].clientY - mapY;
  e.preventDefault();
});

document.getElementById('mapImg').addEventListener('touchmove', function(e) {
  if(!dragging) return;
  mapX = e.touches[0].clientX - startX;
  mapY = e.touches[0].clientY - startY;
  updateMapTransform();
  e.preventDefault();
});

document.getElementById('mapImg').addEventListener('touchend', function() {
  dragging = false;
});

// Drag variables
let dragging = false;
let startX, startY;

// ===== SAVE MENU FUNCTIONS =====
function openMenu() {
  document.getElementById('menuModal').style.display = 'block';
  loadLocations();
}

function closeMenu() {
  document.getElementById('menuModal').style.display = 'none';
}

function loadLocations() {
  const list = document.getElementById('locationsList');
  list.innerHTML = '';
  let hasItems = false;
  
  for(let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if(key && key.startsWith('election_')) {
      hasItems = true;
      const name = key.replace('election_', '');
      
      const div = document.createElement('div');
      div.className = 'location-item';
      
      const nameSpan = document.createElement('span');
      nameSpan.innerText = '📍 ' + name;
      nameSpan.onclick = function() { loadLocation(name); };
      
      const deleteSpan = document.createElement('span');
      deleteSpan.className = 'delete-btn';
      deleteSpan.innerText = '✕';
      deleteSpan.onclick = function(e) {
        e.stopPropagation();
        deleteLocation(name);
      };
      
      div.appendChild(nameSpan);
      div.appendChild(deleteSpan);
      list.appendChild(div);
    }
  }
  
  if (!hasItems) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#999;">No saved locations</div>';
  }
}

function saveLocation() {
  const name = document.getElementById('locName').value.trim();
  if(!name) {
    alert('Please enter a location name');
    return;
  }
  
  const data = {
    // Party logos
    imgRSP: document.getElementById('imgRSP').src || '',
    imgNC: document.getElementById('imgNC').src || '',
    imgUML: document.getElementById('imgUML').src || '',
    imgRPP: document.getElementById('imgRPP').src || '',
    
    // Vote percentages
    countRSP: document.getElementById('countRSP').value,
    countNC: document.getElementById('countNC').value,
    countUML: document.getElementById('countUML').value,
    countRPP: document.getElementById('countRPP').value,
    
    // Map
    map: document.getElementById('mapImg').src || '',
    address: document.getElementById('addrInp').value || '',
    
    // Share date
    shareDate: document.getElementById('shareDate').innerText
  };
  
  try {
    localStorage.setItem('election_' + name, JSON.stringify(data));
    document.getElementById('locName').value = '';
    loadLocations();
    alert('Location saved!');
  } catch(e) {
    alert('Error saving');
  }
}

function loadLocation(name) {
  try {
    const data = JSON.parse(localStorage.getItem('election_' + name));
    if (!data) return;
    
    // Restore logos
    function restoreLogo(party, src) {
      const img = document.getElementById('img' + party);
      const plus = document.getElementById('plus' + party);
      if (src && src !== '' && src !== 'about:blank') {
        img.src = src;
        img.style.display = 'block';
        if (plus) plus.style.display = 'none';
      }
    }
    
    restoreLogo('RSP', data.imgRSP);
    restoreLogo('NC', data.imgNC);
    restoreLogo('UML', data.imgUML);
    restoreLogo('RPP', data.imgRPP);
    
    // Restore vote percentages
    if(data.countRSP) {
      document.getElementById('countRSP').value = data.countRSP;
      updateVoteBar('RSP');
    }
    if(data.countNC) {
      document.getElementById('countNC').value = data.countNC;
      updateVoteBar('NC');
    }
    if(data.countUML) {
      document.getElementById('countUML').value = data.countUML;
      updateVoteBar('UML');
    }
    if(data.countRPP) {
      document.getElementById('countRPP').value = data.countRPP;
      updateVoteBar('RPP');
    }
    
    // Restore map
    if(data.map && data.map !== '') {
      document.getElementById('mapImg').src = data.map;
      document.getElementById('mapImg').style.display = 'block';
      document.getElementById('mapPH').style.display = 'none';
      document.getElementById('mapControls').style.display = 'flex';
    }
    
    document.getElementById('addrInp').value = data.address || '';
    if(data.shareDate) document.getElementById('shareDate').innerText = data.shareDate;
