<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Poster</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#1c1c1c;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
padding:20px;
}

.wrapper{
width:420px;
background:#ffffff;
border-radius:15px;
padding:15px;
}

.poster-header{
text-align:center;
font-size:22px;
font-weight:bold;
background:linear-gradient(#caa54a,#f2d07d);
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.region{
width:100%;
border:none;
border-bottom:2px solid #444;
font-size:16px;
padding:5px;
margin-bottom:15px;
}

.candidates{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#f7f7f7;
border-radius:10px;
padding:10px;
text-align:center;
}

.circle{
width:70px;
height:70px;
border-radius:50%;
background:#e3e3e3;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:pointer;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

.symbol{
width:35px;
height:35px;
margin:5px auto;
display:block;
}

.name{
width:100%;
border:none;
border-bottom:1px solid #999;
text-align:center;
margin:5px 0;
}

.vote{
width:70px;
text-align:center;
font-size:16px;
margin-top:5px;
}

.rank{
font-weight:bold;
margin-top:3px;
}

.poll{
margin-top:15px;
}

.poll-row{
display:flex;
align-items:center;
gap:8px;
margin:6px 0;
}

.bar{
flex:1;
background:#ddd;
height:18px;
border-radius:20px;
overflow:hidden;
}

.bar div{
height:100%;
width:0%;
background:#3aa74c;
}

.map{
margin-top:15px;
text-align:center;
}

.map img{
width:100%;
border-radius:10px;
}

.buttons{
margin-top:15px;
display:flex;
gap:10px;
}

button{
flex:1;
padding:10px;
border:none;
background:#333;
color:white;
border-radius:8px;
}

</style>
</head>

<body>

<div class="wrapper" id="poster">

<div class="poster-header">ELECTION UPDATE</div>

<input class="region" id="region" placeholder="Region">

<div class="candidates">

<div class="card" data-id="1">
<div class="circle" onclick="uploadPhoto(1)">
<img id="photo1">
</div>

<input type="file" id="file1" hidden accept="image/*" onchange="loadPhoto(1)">

<input type="file" accept="image/*" onchange="loadSymbol(1)">
<img id="symbol1" class="symbol">

<input class="name" placeholder="Candidate">

<input class="vote" id="vote1" type="number" value="0" oninput="updateAll()">

<div class="rank" id="rank1">#1</div>

</div>

<div class="card" data-id="2">
<div class="circle" onclick="uploadPhoto(2)">
<img id="photo2">
</div>

<input type="file" id="file2" hidden accept="image/*" onchange="loadPhoto(2)">

<input type="file" accept="image/*" onchange="loadSymbol(2)">
<img id="symbol2" class="symbol">

<input class="name" placeholder="Candidate">

<input class="vote" id="vote2" type="number" value="0" oninput="updateAll()">

<div class="rank" id="rank2">#2</div>

</div>

<div class="card" data-id="3">
<div class="circle" onclick="uploadPhoto(3)">
<img id="photo3">
</div>

<input type="file" id="file3" hidden accept="image/*" onchange="loadPhoto(3)">

<input type="file" accept="image/*" onchange="loadSymbol(3)">
<img id="symbol3" class="symbol">

<input class="name" placeholder="Candidate">

<input class="vote" id="vote3" type="number" value="0" oninput="updateAll()">

<div class="rank" id="rank3">#3</div>

</div>

<div class="card" data-id="4">
<div class="circle" onclick="uploadPhoto(4)">
<img id="photo4">
</div>

<input type="file" id="file4" hidden accept="image/*" onchange="loadPhoto(4)">

<input type="file" accept="image/*" onchange="loadSymbol(4)">
<img id="symbol4" class="symbol">

<input class="name" placeholder="Candidate">

<input class="vote" id="vote4" type="number" value="0" oninput="updateAll()">

<div class="rank" id="rank4">#4</div>

</div>

</div>


<div class="poll">

<div class="poll-row">
<span>A</span>
<div class="bar"><div id="bar1"></div></div>
<input id="poll1" type="number" value="0" oninput="updatePoll()">
</div>

<div class="poll-row">
<span>B</span>
<div class="bar"><div id="bar2"></div></div>
<input id="poll2" type="number" value="0" oninput="updatePoll()">
</div>

</div>

<div class="map">

<input type="file" accept="image/*" onchange="loadMap(event)">
<img id="mapimg">

</div>

<div class="buttons">
<button onclick="saveData()">Save</button>
<button onclick="downloadImage()">Download</button>
</div>

</div>

<script>

function uploadPhoto(n){
document.getElementById("file"+n).click()
}

function loadPhoto(n){
let file=document.getElementById("file"+n).files[0]
let reader=new FileReader()
reader.onload=e=>{
document.getElementById("photo"+n).src=e.target.result
}
reader.readAsDataURL(file)
}

function loadSymbol(n){
let file=event.target.files[0]
let reader=new FileReader()
reader.onload=e=>{
document.getElementById("symbol"+n).src=e.target.result
}
reader.readAsDataURL(file)
}

function loadMap(event){
let file=event.target.files[0]
let reader=new FileReader()
reader.onload=e=>{
document.getElementById("mapimg").src=e.target.result
}
reader.readAsDataURL(file)
}

function updateAll(){

let votes=[
{ id:1,v:parseInt(vote1.value)||0},
{ id:2,v:parseInt(vote2.value)||0},
{ id:3,v:parseInt(vote3.value)||0},
{ id:4,v:parseInt(vote4.value)||0}
]

votes.sort((a,b)=>b.v-a.v)

votes.forEach((item,index)=>{
document.getElementById("rank"+item.id).innerText="#"+(index+1)
})

}

function updatePoll(){

let p1=parseInt(poll1.value)||0
let p2=parseInt(poll2.value)||0

let total=p1+p2

if(total==0)return

bar1.style.width=(p1/total*100)+"%"
bar2.style.width=(p2/total*100)+"%"

}

function saveData(){

let data=document.getElementById("poster").innerHTML
localStorage.setItem("posterData",data)

}

window.onload=function(){

let saved=localStorage.getItem("posterData")
if(saved){
document.getElementById("poster").innerHTML=saved
}

}

function downloadImage(){

html2canvas(document.getElementById("poster")).then(canvas=>{
let link=document.createElement("a")
link.download="poster.png"
link.href=canvas.toDataURL()
link.click()
})

}

</script>

</body>
</html>
