<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Results</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e9e9ec;font-family:Arial;display:flex;justify-content:center}
.wrapper{width:100%;max-width:430px;background:#f2f2f4;padding:15px}

/* SIMPLE STYLES */
.box{background:white;border-radius:10px;padding:10px;margin:10px 0}
.row{display:flex;gap:5px;margin:10px 0}
.col{flex:1;background:white;border-radius:10px;padding:10px;text-align:center}
button{width:100%;padding:12px;background:#007aff;color:white;border:none;border-radius:20px;margin:5px 0;font-size:16px}
input{padding:5px;margin:2px 0;width:100%;border:1px solid #ddd;border-radius:5px;text-align:center}
.photo{width:60px;height:60px;background:#eee;border-radius:50%;margin:5px auto;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.photo img{width:100%;height:100%;object-fit:cover;display:none}
.photo input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer}
.map{width:100%;height:120px;background:#eee;border-radius:10px;position:relative;margin:5px 0}
.map img{width:100%;height:100%;object-fit:contain;display:none}
.map input{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer}
</style>
</head>
<body>
<div class="wrapper">

<!-- CAPTURE AREA -->
<div id="captureArea">
  <h1 style="margin:10px 0">🗳 Election Results</h1>
  <div id="clock" style="font-size:20px;margin:10px 0">--:--:--</div>
  
  <input type="text" id="address" placeholder="Venue address..." style="margin:10px 0;padding:10px">

  <!-- CARDS -->
  <div class="row">
    <!-- 1 -->
    <div class="col">
      <div style="background:#b38b3a;color:white;padding:2px">1st</div>
      <div class="photo" id="photo1">
        <span>+</span>
        <img id="img1">
        <input type="file" id="file1" onchange="uploadPhoto(1)">
      </div>
      <input id="name1" value="THOMAS F." onkeyup="updateAll()">
      <input id="party1" value="PROGRESS" onkeyup="updateAll()">
      <input id="votes1" value="14250" onkeyup="updateAll()">
    </div>
    <!-- 2 -->
    <div class="col">
      <div style="background:#8e8e93;color:white;padding:2px">2nd</div>
      <div class="photo" id="photo2">
        <span>+</span>
        <img id="img2">
        <input type="file" id="file2" onchange="uploadPhoto(2)">
      </div>
      <input id="name2" value="LISA M." onkeyup="updateAll()">
      <input id="party2" value="UNITY" onkeyup="updateAll()">
      <input id="votes2" value="11230" onkeyup="updateAll()">
    </div>
    <!-- 3 -->
    <div class="col">
      <div style="background:#9b5e2a;color:white;padding:2px">3rd</div>
      <div class="photo" id="photo3">
        <span>+</span>
        <img id="img3">
        <input type="file" id="file3" onchange="uploadPhoto(3)">
      </div>
      <input id="name3" value="JAMES K." onkeyup="updateAll()">
      <input id="party3" value="HORIZON" onkeyup="updateAll()">
      <input id="votes3" value="9850" onkeyup="updateAll()">
    </div>
  </div>

  <!-- NEEDS -->
  <div class="box">
    <div style="background:black;color:white;padding:5px">VOTES NEEDED TO WIN</div>
    <div style="padding:5px">2nd: <span id="needName2">LISA M.</span> needs <span id="needVotes2">0</span></div>
    <div style="padding:5px">3rd: <span id="needName3">JAMES K.</span> needs <span id="needVotes3">0</span></div>
  </div>

  <!-- MAP -->
  <div class="box">
    <div style="text-align:center">🗺 MAP</div>
    <div class="map" id="mapContainer">
      <div id="mapPlaceholder" style="text-align:center;padding:40px">➕ Tap to add map</div>
      <img id="mapImg">
      <input type="file" id="mapFile" onchange="uploadMap()">
    </div>
    <div id="mapControls" style="display:none;text-align:center;margin:5px">
      <button onclick="mapZoom(0.2)" style="width:auto;padding:5px 10px">+</button>
      <button onclick="mapZoom(-0.2)" style="width:auto;padding:5px 10px">-</button>
      <button onclick="resetMap()" style="width:auto;padding:5px 10px">↺</button>
    </div>
  </div>
</div>

<!-- BUTTONS -->
<button onclick="openMenu()">📋 LOCATIONS MENU</button>
<button onclick="downloadImage()" style="background:black">⬇ DOWNLOAD JPG</button>

<!-- MENU MODAL -->
<div id="menuModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5)">
  <div style="background:white;width:90%;margin:50px auto;padding:20px;border-radius:10px">
    <h3>Saved Locations</h3>
    <div id="locationsList"></div>
    <input type="text" id="locName" placeholder="New location name" style="width:100%;padding:8px;margin:10px 0">
    <button onclick="saveLocation()">💾 SAVE</button>
    <button onclick="closeMenu()" style="background:#666">CLOSE</button>
  </div>
</div>

<script>
// ===== CLOCK =====
function updateClock() {
  let d = new Date();
  document.getElementById('clock').innerText = 
    d.getHours().toString().padStart(2,'0') + ':' +
    d.getMinutes().toString().padStart(2,'0') + ':' +
    d.getSeconds().toString().padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ===== PHOTO UPLOAD =====
function uploadPhoto(num) {
  let file = document.getElementById('file' + num);
  let img = document.getElementById('img' + num);
  
  if(file.files && file.files[0]) {
    let reader = new FileReader();
    reader.onload = function(e) {
      img.src = e.target.result;
      img.style.display = 'block';
      document.querySelector('#photo' + num + ' span').style.display = 'none';
    }
    reader.readAsDataURL(file.files[0]);
  }
}

// ===== GET VOTES =====
function getVote(id) {
  let val = document.getElementById(id).value;
  return parseInt(val.replace(/[^0-9]/g,'')) || 0;
}

// ===== UPDATE ALL =====
function updateAll() {
  // Get values
  let c1 = {
    name: document.getElementById('name1').value,
    votes: getVote('votes1'),
    img: document.getElementById('img1').src
  };
  let c2 = {
    name: document.getElementById('name2').value,
    votes: getVote('votes2'),
    img: document.getElementById('img2').src
  };
  let c3 = {
    name: document.getElementById('name3').value,
    votes: getVote('votes3'),
    img: document.getElementById('img3').src
  };
  
  // Sort
  let sorted = [c1, c2, c3].sort((a,b) => b.votes - a.votes);
  
  // Update displays
  document.getElementById('needName2').innerText = sorted[1].name;
  document.getElementById('needName3').innerText = sorted[2].name;
  
  let need2 = Math.max(0, sorted[0].votes - sorted[1].votes + 1);
  let need3 = Math.max(0, sorted[0].votes - sorted[2].votes + 1);
  
  document.getElementById('needVotes2').innerText = need2;
  document.getElementById('needVotes3').innerText = need3;
}

// ===== MAP =====
let mapScale = 1;
let mapX = 0;
let mapY = 0;

function uploadMap() {
  let file = document.getElementById('mapFile');
  if(file.files && file.files[0]) {
    let reader = new FileReader();
    reader.onload = function(e) {
      let img = document.getElementById('mapImg');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('mapPlaceholder').style.display = 'none';
      document.getElementById('mapControls').style.display = 'block';
    }
    reader.readAsDataURL(file.files[0]);
  }
}

function updateMapTransform() {
  document.getElementById('mapImg').style.transform = 
    'translate(' + mapX + 'px,' + mapY + 'px) scale(' + mapScale + ')';
}

function mapZoom(d) {
  mapScale = Math.max(0.5, Math.min(3, mapScale + d));
  updateMapTransform();
}

function resetMap() {
  mapScale = 1;
  mapX = 0;
  mapY = 0;
  updateMapTransform();
}

// ===== SAVE MENU =====
function openMenu() {
  document.getElementById('menuModal').style.display = 'block';
  loadLocations();
}

function closeMenu() {
  document.getElementById('menuModal').style.display = 'none';
}

function loadLocations() {
  let list = document.getElementById('locationsList');
  list.innerHTML = '';
  
  for(let i = 0; i < localStorage.length; i++) {
    let key = localStorage.key(i);
    if(key.startsWith('elect_')) {
      let name = key.replace('elect_', '');
      list.innerHTML += '<div style="padding:5px;border-bottom:1px solid #ddd">' +
        '<span onclick="loadLocation(\'' + name + '\')">📍 ' + name + '</span> ' +
        '<span style="color:red;float:right" onclick="deleteLocation(\'' + name + '\')">✕</span>' +
        '</div>';
    }
  }
}

function saveLocation() {
  let name = document.getElementById('locName').value;
  if(!name) return alert('Enter name');
  
  let data = {
    n1: document.getElementById('name1').value,
    v1: document.getElementById('votes1').value,
    i1: document.getElementById('img1').src,
    n2: document.getElementById('name2').value,
    v2: document.getElementById('votes2').value,
    i2: document.getElementById('img2').src,
    n3: document.getElementById('name3').value,
    v3: document.getElementById('votes3').value,
    i3: document.getElementById('img3').src,
    map: document.getElementById('mapImg').src,
    addr: document.getElementById('address').value
  };
  
  localStorage.setItem('elect_' + name, JSON.stringify(data));
  document.getElementById('locName').value = '';
  loadLocations();
}

function loadLocation(name) {
  let data = JSON.parse(localStorage.getItem('elect_' + name));
  
  document.getElementById('name1').value = data.n1 || '';
  document.getElementById('votes1').value = data.v1 || '0';
  document.getElementById('name2').value = data.n2 || '';
  document.getElementById('votes2').value = data.v2 || '0';
  document.getElementById('name3').value = data.n3 || '';
  document.getElementById('votes3').value = data.v3 || '0';
  
  if(data.i1 && data.i1 !== '') {
    document.getElementById('img1').src = data.i1;
    document.getElementById('img1').style.display = 'block';
    document.querySelector('#photo1 span').style.display = 'none';
  }
  if(data.i2 && data.i2 !== '') {
    document.getElementById('img2').src = data.i2;
    document.getElementById('img2').style.display = 'block';
    document.querySelector('#photo2 span').style.display = 'none';
  }
  if(data.i3 && data.i3 !== '') {
    document.getElementById('img3').src = data.i3;
    document.getElementById('img3').style.display = 'block';
    document.querySelector('#photo3 span').style.display = 'none';
  }
  
  if(data.map && data.map !== '') {
    document.getElementById('mapImg').src = data.map;
    document.getElementById('mapImg').style.display = 'block';
    document.getElementById('mapPlaceholder').style.display = 'none';
    document.getElementById('mapControls').style.display = 'block';
  }
  
  document.getElementById('address').value = data.addr || '';
  
  closeMenu();
  updateAll();
}

function deleteLocation(name) {
  localStorage.removeItem('elect_' + name);
  loadLocations();
}

// ===== DOWNLOAD =====
function downloadImage() {
  let btn = document.getElementById('dlBtn');
  let ctrls = document.getElementById('mapControls');
  let was = ctrls.style.display;
  
  ctrls.style.display = 'none';
  
  html2canvas(document.getElementById('captureArea'), {
    scale: 2,
    backgroundColor: '#f2f2f4'
  }).then(canvas => {
    ctrls.style.display = was;
    
    let link = document.createElement('a');
    link.download = 'election.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  });
}

// Initial update
updateAll();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
