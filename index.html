<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Election Results - Working</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e9e9ec;font-family:Arial,sans-serif;display:flex;justify-content:center}
.wrapper{width:100%;max-width:430px;background:#f2f2f4;padding:15px}

/* HEADER */
.top{display:flex;justify-content:space-between;margin-bottom:15px}
h1{font-size:22px;color:#000}
#clock{background:#ddd;padding:5px 10px;border-radius:20px;font-size:14px}

/* ADDRESS */
.address-box{background:white;border-radius:15px;padding:10px;margin-bottom:15px}
.addr-inp{width:100%;border:none;padding:5px;font-size:14px}

hr{margin:10px 0;border-color:#ccc}

/* CARDS */
.cards{display:flex;gap:5px;margin-bottom:15px}
.card{flex:1;background:white;border-radius:15px;padding:10px 3px;text-align:center;position:relative}
.rank{position:absolute;top:5px;left:5px;background:gold;padding:2px 6px;border-radius:10px;font-size:10px;color:white}
.gold .rank{background:#b38b3a}
.silver .rank{background:#8e8e93}
.bronze .rank{background:#9b5e2a}

/* PHOTO */
.photo-wrap{width:60px;height:60px;margin:20px auto 5px;position:relative}
.ring-bg{width:100%;height:100%;border-radius:50%;padding:3px}
.gold-ring{background:linear-gradient(45deg,gold,#ffe68f)}
.silver-ring{background:linear-gradient(45deg,silver,white)}
.bronze-ring{background:linear-gradient(45deg,#cd7f32,#f2c18d)}
.circle{width:100%;height:100%;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.circle img{width:100%;height:100%;object-fit:cover;display:none}
.plus{font-size:20px;color:#999}
.photo-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}

.divider{height:1px;background:#ddd;margin:8px 0}

/* TEXT INPUTS */
.ci{width:100%;border:none;text-align:center;padding:3px 0;font-size:12px;background:transparent}
.cn{font-weight:bold}
.cp{font-size:10px}
.cv{font-size:14px;font-weight:bold}
.gt{color:#b38b3a}
.st{color:#555}
.bt{color:#9b5e2a}

/* NEEDS BOX */
.needs-box{background:white;border-radius:15px;padding:10px;margin:15px 0}
.needs-hdr{background:#333;color:white;padding:5px;border-radius:10px;margin-bottom:10px;font-size:11px}
.needs-row{display:flex;align-items:center;padding:8px 5px;border-bottom:1px solid #eee}
.ndot{width:20px;height:20px;border-radius:50%;background:gray;color:white;display:flex;align-items:center;justify-content:center;font-size:9px;margin-right:8px}
.ndot.silver{background:#8e8e93}
.ndot.bronze{background:#9b5e2a}
.nname{flex:1;font-size:12px}
.nright{text-align:right}
.nnum{font-weight:bold;font-size:14px}
.nlbl{font-size:8px;color:#999}

/* MAP */
.map-box{background:white;border-radius:15px;padding:15px;margin:15px 0}
.map-title{text-align:center;font-size:12px;margin-bottom:10px}
.map-container{width:100%;height:150px;background:#f0f0f0;border-radius:10px;position:relative;overflow:hidden}
.map-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.map-ph-plus{font-size:40px;color:#999}
.map-ph-hint{font-size:10px;color:#999}
#mapImg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none}
#mapFile{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.map-controls{display:flex;gap:5px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.map-btn{padding:5px 10px;background:#f0f0f0;border:none;border-radius:20px;font-size:11px}

/* SAVE MENU */
.menu-btn{width:100%;padding:10px;background:#007aff;color:white;border:none;border-radius:25px;margin-bottom:10px;font-size:14px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}
.modal-content{background:white;width:90%;max-width:380px;margin:50px auto;border-radius:20px;padding:20px}
.modal-title{font-size:18px;font-weight:bold;margin-bottom:15px}
.location-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee}
.delete-btn{color:red;padding:0 5px}

/* DOWNLOAD */
#dlBtn{width:100%;padding:15px;background:black;color:white;border:none;border-radius:30px;font-size:16px;margin-top:10px}
</style>
</head>
<body>
<div class="wrapper">

 <!-- CAPTURE AREA -->
 <div id="captureArea">

  <div class="top">
   <h1>Election Results</h1>
   <div id="clock">--:--:--</div>
  </div>

  <!-- ADDRESS -->
  <div class="address-box">
   <input class="addr-inp" id="addrInp" placeholder="Election venue...">
  </div>

  <hr>

  <!-- CARDS -->
  <div class="cards">
   <!-- 1ST -->
   <div class="card gold" id="card1">
    <div class="rank" id="rank1">1st</div>
    <div class="photo-wrap">
     <div class="ring-bg gold-ring">
      <div class="circle" id="circle1">
       <span class="plus">+</span>
       <img id="img1">
      </div>
     </div>
     <input type="file" accept="image/*" class="photo-input" id="file1" onchange="uploadPhoto(1)">
    </div>
    <div class="divider"></div>
    <input class="ci cn gt" id="name1" value="THOMAS F." onkeyup="updateAll()">
    <input class="ci cp gt" id="party1" value="PROGRESS" onkeyup="updateAll()">
    <input class="ci cv gt" id="votes1" value="14250" onkeyup="updateAll()">
   </div>

   <!-- 2ND -->
   <div class="card silver" id="card2">
    <div class="rank" id="rank2">2nd</div>
    <div class="photo-wrap">
     <div class="ring-bg silver-ring">
      <div class="circle" id="circle2">
       <span class="plus">+</span>
       <img id="img2">
      </div>
     </div>
     <input type="file" accept="image/*" class="photo-input" id="file2" onchange="uploadPhoto(2)">
    </div>
    <div class="divider"></div>
    <input class="ci cn st" id="name2" value="LISA M." onkeyup="updateAll()">
    <input class="ci cp st" id="party2" value="UNITY" onkeyup="updateAll()">
    <input class="ci cv st" id="votes2" value="11230" onkeyup="updateAll()">
   </div>

   <!-- 3RD -->
   <div class="card bronze" id="card3">
    <div class="rank" id="rank3">3rd</div>
    <div class="photo-wrap">
     <div class="ring-bg bronze-ring">
      <div class="circle" id="circle3">
       <span class="plus">+</span>
       <img id="img3">
      </div>
     </div>
     <input type="file" accept="image/*" class="photo-input" id="file3" onchange="uploadPhoto(3)">
    </div>
    <div class="divider"></div>
    <input class="ci cn bt" id="name3" value="JAMES K." onkeyup="updateAll()">
    <input class="ci cp bt" id="party3" value="HORIZON" onkeyup="updateAll()">
    <input class="ci cv bt" id="votes3" value="9850" onkeyup="updateAll()">
   </div>
  </div>

  <!-- NEEDS TO WIN -->
  <div class="needs-box">
   <div class="needs-hdr">🗳 VOTES NEEDED TO WIN</div>
   <div class="needs-row">
    <div class="ndot silver">2</div>
    <div class="nname" id="needName2">LISA M.</div>
    <div class="nright"><span class="nnum" id="needVotes2">0</span><div class="nlbl">needed</div></div>
   </div>
   <div class="needs-row">
    <div class="ndot bronze">3</div>
    <div class="nname" id="needName3">JAMES K.</div>
    <div class="nright"><span class="nnum" id="needVotes3">0</span><div class="nlbl">needed</div></div>
   </div>
  </div>

  <!-- MAP -->
  <div class="map-box">
   <div class="map-title">🗺 REGION MAP</div>
   <div class="map-container">
    <div class="map-ph" id="mapPH">
     <div class="map-ph-plus">+</div>
     <div class="map-ph-hint">Tap to add map</div>
    </div>
    <img id="mapImg">
    <input type="file" accept="image/*" id="mapFile" onchange="uploadMap()">
   </div>
   <div class="map-controls" id="mapControls" style="display:none">
    <button class="map-btn" onclick="mapZoom(0.2)">➕</button>
    <button class="map-btn" onclick="mapZoom(-0.2)">➖</button>
    <button class="map-btn" onclick="resetMap()">⟲</button>
   </div>
  </div>

 </div> <!-- end capture -->

 <!-- SAVE MENU BUTTON -->
 <button class="menu-btn" onclick="openMenu()">📋 LOCATIONS MENU</button>
 <button id="dlBtn" onclick="downloadImage()">⬇ DOWNLOAD JPG</button>

 <!-- MODAL -->
 <div class="modal" id="menuModal" onclick="if(event.target===this) closeMenu()">
  <div class="modal-content">
   <div class="modal-title">Saved Locations</div>
   <div id="locationsList"></div>
   <input type="text" id="locName" placeholder="New location name" style="width:100%;padding:8px;margin:10px 0;border-radius:10px;border:1px solid #ddd">
   <button class="menu-btn" onclick="saveLocation()" style="margin:0">💾 SAVE CURRENT</button>
   <button class="menu-btn" style="background:#666;margin-top:5px" onclick="closeMenu()">CLOSE</button>
  </div>
 </div>
</div>

<script>
// ===== CLOCK =====
function updateClock() {
  const d = new Date();
  document.getElementById('clock').innerText = 
    d.getHours().toString().padStart(2,'0') + ':' +
    d.getMinutes().toString().padStart(2,'0') + ':' +
    d.getSeconds().toString().padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ===== PHOTO UPLOAD =====
function uploadPhoto(cardNum) {
  const fileInput = document.getElementById('file' + cardNum);
  const img = document.getElementById('img' + cardNum);
  const circle = document.getElementById('circle' + cardNum);
  
  if(fileInput.files && fileInput.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      img.src = e.target.result;
      img.style.display = 'block';
      circle.querySelector('.plus').style.display = 'none';
    }
    reader.readAsDataURL(fileInput.files[0]);
  }
}

// ===== GET VOTE NUMBERS =====
function getVote(id) {
  return parseInt(document.getElementById(id).value.replace(/[^0-9]/g,'')) || 0;
}

// ===== UPDATE EVERYTHING =====
function updateAll() {
  // Get current values
  const c1 = {
    name: document.getElementById('name1').value,
    party: document.getElementById('party1').value,
    votes: getVote('votes1'),
    img: document.getElementById('img1').src,
    plus: document.querySelector('#circle1 .plus')
  };
  
  const c2 = {
    name: document.getElementById('name2').value,
    party: document.getElementById('party2').value,
    votes: getVote('votes2'),
    img: document.getElementById('img2').src,
    plus: document.querySelector('#circle2 .plus')
  };
  
  const c3 = {
    name: document.getElementById('name3').value,
    party: document.getElementById('party3').value,
    votes: getVote('votes3'),
    img: document.getElementById('img3').src,
    plus: document.querySelector('#circle3 .plus')
  };
  
  // Sort by votes
  let sorted = [c1, c2, c3].sort((a,b) => b.votes - a.votes);
  
  // Update card 1 (gold)
  document.getElementById('name1').value = sorted[0].name;
  document.getElementById('party1').value = sorted[0].party;
  document.getElementById('votes1').value = sorted[0].votes.toLocaleString();
  if(sorted[0].img) {
    document.getElementById('img1').src = sorted[0].img;
    document.getElementById('img1').style.display = 'block';
    document.querySelector('#circle1 .plus').style.display = 'none';
  }
  
  // Update card 2 (silver)
  document.getElementById('name2').value = sorted[1].name;
  document.getElementById('party2').value = sorted[1].party;
  document.getElementById('votes2').value = sorted[1].votes.toLocaleString();
  if(sorted[1].img) {
    document.getElementById('img2').src = sorted[1].img;
    document.getElementById('img2').style.display = 'block';
    document.querySelector('#circle2 .plus').style.display = 'none';
  }
  
  // Update card 3 (bronze)
  document.getElementById('name3').value = sorted[2].name;
  document.getElementById('party3').value = sorted[2].party;
  document.getElementById('votes3').value = sorted[2].votes.toLocaleString();
  if(sorted[2].img) {
    document.getElementById('img3').src = sorted[2].img;
    document.getElementById('img3').style.display = 'block';
    document.querySelector('#circle3 .plus').style.display = 'none';
  }
  
  // Update needs box
  document.getElementById('needName2').innerText = sorted[1].name;
  document.getElementById('needName3').innerText = sorted[2].name;
  
  const need2 = Math.max(0, sorted[0].votes - sorted[1].votes + 1);
  const need3 = Math.max(0, sorted[0].votes - sorted[2].votes + 1);
  
  document.getElementById('needVotes2').innerText = need2.toLocaleString();
  document.getElementById('needVotes3').innerText = need3.toLocaleString();
}

// ===== MAP FUNCTIONS =====
let mapScale = 1;
let mapX = 0;
let mapY = 0;

function uploadMap() {
  const file = document.getElementById('mapFile');
  if(file.files && file.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById('mapImg');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('mapPH').style.display = 'none';
      document.getElementById('mapControls').style.display = 'flex';
      mapScale = 1;
      mapX = 0;
      mapY = 0;
      updateMapTransform();
    }
    reader.readAsDataURL(file.files[0]);
  }
}

function updateMapTransform() {
  document.getElementById('mapImg').style.transform = 
    `translate(${mapX}px, ${mapY}px) scale(${mapScale})`;
}

function mapZoom(delta) {
  mapScale = Math.max(0.5, Math.min(3, mapScale + delta));
  updateMapTransform();
}

function resetMap() {
  mapScale = 1;
  mapX = 0;
  mapY = 0;
  updateMapTransform();
}

// Touch drag
let dragging = false;
let startX, startY;

document.getElementById('mapImg').addEventListener('touchstart', function(e) {
  if(!this.src) return;
  dragging = true;
  startX = e.touches[0].clientX - mapX;
  startY = e.touches[0].clientY - mapY;
  e.preventDefault();
});

document.getElementById('mapImg').addEventListener('touchmove', function(e) {
  if(!dragging) return;
  mapX = e.touches[0].clientX - startX;
  mapY = e.touches[0].clientY - startY;
  updateMapTransform();
  e.preventDefault();
});

document.getElementById('mapImg').addEventListener('touchend', function() {
  dragging = false;
});

// ===== SAVE MENU =====
function openMenu() {
  document.getElementById('menuModal').style.display = 'block';
  loadLocations();
}

function closeMenu() {
  document.getElementById('menuModal').style.display = 'none';
}

function loadLocations() {
  const list = document.getElementById('locationsList');
  list.innerHTML = '';
  
  for(let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if(key.startsWith('election_')) {
      const data = JSON.parse(localStorage.getItem(key));
      const name = key.replace('election_', '');
      
      const div = document.createElement('div');
      div.className = 'location-item';
      div.innerHTML = `
        <span onclick="loadLocation('${name}')">📍 ${name}</span>
        <span class="delete-btn" onclick="deleteLocation('${name}')">✕</span>
      `;
      list.appendChild(div);
    }
  }
}

function saveLocation() {
  const name = document.getElementById('locName').value;
  if(!name) return alert('Enter name');
  
  const data = {
    name1: document.getElementById('name1').value,
    party1: document.getElementById('party1').value,
    votes1: document.getElementById('votes1').value,
    img1: document.getElementById('img1').src,
    name2: document.getElementById('name2').value,
    party2: document.getElementById('party2').value,
    votes2: document.getElementById('votes2').value,
    img2: document.getElementById('img2').src,
    name3: document.getElementById('name3').value,
    party3: document.getElementById('party3').value,
    votes3: document.getElementById('votes3').value,
    img3: document.getElementById('img3').src,
    map: document.getElementById('mapImg').src,
    address: document.getElementById('addrInp').value
  };
  
  localStorage.setItem('election_' + name, JSON.stringify(data));
  document.getElementById('locName').value = '';
  loadLocations();
}

function loadLocation(name) {
  const data = JSON.parse(localStorage.getItem('election_' + name));
  
  document.getElementById('name1').value = data.name1;
  document.getElementById('party1').value = data.party1;
  document.getElementById('votes1').value = data.votes1;
  
  document.getElementById('name2').value = data.name2;
  document.getElementById('party2').value = data.party2;
  document.getElementById('votes2').value = data.votes2;
  
  document.getElementById('name3').value = data.name3;
  document.getElementById('party3').value = data.party3;
  document.getElementById('votes3').value = data.votes3;
  
  if(data.img1) {
    document.getElementById('img1').src = data.img1;
    document.getElementById('img1').style.display = 'block';
    document.querySelector('#circle1 .plus').style.display = 'none';
  }
  
  if(data.img2) {
    document.getElementById('img2').src = data.img2;
    document.getElementById('img2').style.display = 'block';
    document.querySelector('#circle2 .plus').style.display = 'none';
  }
  
  if(data.img3) {
    document.getElementById('img3').src = data.img3;
    document.getElementById('img3').style.display = 'block';
    document.querySelector('#circle3 .plus').style.display = 'none';
  }
  
  if(data.map) {
    document.getElementById('mapImg').src = data.map;
    document.getElementById('mapImg').style.display = 'block';
    document.getElementById('mapPH').style.display = 'none';
    document.getElementById('mapControls').style.display = 'flex';
  }
  
  document.getElementById('addrInp').value = data.address || '';
  
  closeMenu();
  updateAll();
}

function deleteLocation(name) {
  localStorage.removeItem('election_' + name);
  loadLocations();
}

// ===== DOWNLOAD (HIDE MAP CONTROLS) =====
function downloadImage() {
  const btn = document.getElementById('dlBtn');
  const controls = document.getElementById('mapControls');
  const wasVisible = controls.style.display;
  
  controls.style.display = 'none';
  btn.innerText = 'PROCESSING...';
  
  html2canvas(document.getElementById('captureArea'), {
    scale: 2,
    backgroundColor: '#f2f2f4'
  }).then(canvas => {
    controls.style.display = wasVisible;
    btn.innerText = '⬇ DOWNLOAD JPG';
    
    const link = document.createElement('a');
    link.download = 'election.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  }).catch(() => {
    controls.style.display = wasVisible;
    btn.innerText = '⬇ DOWNLOAD JPG';
    alert('Try again');
  });
}

// Initial update
setTimeout(updateAll, 100);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
