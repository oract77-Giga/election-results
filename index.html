<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Update</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
background:#111;
display:flex;
justify-content:center;
font-family:serif;
}

.wrapper{
width:420px;
padding:10px;
}

/* POSTER */

.poster{
background:#f5e2b8;
padding:20px;
border-radius:10px;
color:#3b2b1a;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* HEADER */

.header{
text-align:center;
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

/* PARTY ROW */

.party-row{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.party{
text-align:center;
font-size:12px;
}

.party img{
width:40px;
height:40px;
display:block;
margin:auto;
}

/* CANDIDATES */

.candidate{
display:flex;
align-items:center;
margin-bottom:12px;
}

.candidate img{
width:55px;
height:55px;
border-radius:50%;
margin-right:10px;
object-fit:cover;
border:2px solid #3b2b1a;
}

.name{
font-weight:bold;
font-size:16px;
}

.partyname{
font-size:13px;
}

/* RESULT BOX */

.result{
background:#2f2f2f;
color:white;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.result-row{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

/* BUTTON */

button{
margin-top:15px;
width:100%;
padding:10px;
font-size:16px;
border:none;
border-radius:6px;
background:#c62828;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="wrapper">

<div id="captureArea" class="poster">

<div class="header">
ELECTION UPDATE 2082
</div>

<div class="party-row">

<div class="party">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/9c/Nepali_Congress_tree.svg">
NC
</div>

<div class="party">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/CPN-UML_sun.svg">
UML
</div>

<div class="party">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/RSP_bell.svg">
RSP
</div>

<div class="party">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Maoist_Centre_symbol.svg">
MC
</div>

</div>

<!-- Candidates -->

<div class="candidate">
<img src="https://i.imgur.com/1XK0K0E.jpeg">
<div>
<div class="name">Candidate Name</div>
<div class="partyname">Party Name</div>
</div>
</div>

<div class="candidate">
<img src="https://i.imgur.com/1XK0K0E.jpeg">
<div>
<div class="name">Candidate Name</div>
<div class="partyname">Party Name</div>
</div>
</div>

<div class="candidate">
<img src="https://i.imgur.com/1XK0K0E.jpeg">
<div>
<div class="name">Candidate Name</div>
<div class="partyname">Party Name</div>
</div>
</div>

<div class="candidate">
<img src="https://i.imgur.com/1XK0K0E.jpeg">
<div>
<div class="name">Candidate Name</div>
<div class="partyname">Party Name</div>
</div>
</div>

<!-- RESULT -->

<div class="result">

<div class="result-row">
<span>COUNTING</span>
<span>12345</span>
</div>

<div class="result-row">
<span>LEADING</span>
<span>Candidate Name</span>
</div>

<div class="result-row">
<span>LEAD</span>
<span>+2300</span>
</div>

</div>

</div>

<button onclick="capture()">Download Poster</button>

</div>

<script>

function capture(){

html2canvas(document.querySelector("#captureArea")).then(canvas=>{

let link=document.createElement("a")
link.download="election-update.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
