<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Election Results</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e9e9ec;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;justify-content:center;min-height:100vh;}
.wrapper{width:100%;max-width:430px;background:#f2f2f4}
.container{background:#f2f2f4;padding:18px}

/* HEADER */
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
h1{font-size:22px;font-weight:700;color:#1c1c1e}
#clock{font-size:12px;color:#1c1c1e;font-weight:600;background:rgba(142,142,147,0.15);padding:6px 11px;border-radius:30px}

/* ADDRESS */
.address-box{background:#fff;border-radius:18px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.address-icon{font-size:16px}
.addr-inp{font-size:15px;border:none;outline:none;background:transparent;width:100%}

hr{border:none;height:1px;background:#d1d1d6;margin:0 0 14px}

/* CARDS */
.cards{display:flex;gap:8px;margin-bottom:10px}
.card{flex:1;background:#fff;border-radius:20px;padding:12px 4px 16px;text-align:center;position:relative;box-shadow:0 10px 20px rgba(0,0,0,0.1)}
.rank{position:absolute;top:6px;left:6px;padding:4px 8px;border-radius:20px;font-size:10px;font-weight:800;color:#fff}
.gold .rank{background:#b38b3a}
.silver .rank{background:#8e8e93}
.bronze .rank{background:#9b5e2a}

/* PHOTO RING */
.photo-wrap{width:70px;height:70px;margin:15px auto 8px;position:relative}
.ring-bg{width:100%;height:100%;border-radius:50%;padding:4px;margin:0 auto}
.gold-ring{background:linear-gradient(45deg,#d4af37,#f9e27a,#d4af37)}
.silver-ring{background:linear-gradient(45deg,#c0c0c0,#ffffff,#c0c0c0)}
.bronze-ring{background:linear-gradient(45deg,#cd7f32,#f2c18d,#cd7f32)}
.circle{width:100%;height:100%;border-radius:50%;background:#f5f5f7;display:flex;align-items:center;justify-content:center;overflow:hidden}
.circle img{width:100%;height:100%;object-fit:cover;display:none}
.plus{font-size:24px;color:#aaa}
.photo-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}

.divider{height:1px;background:#ddd;margin:8px 0 10px}

/* TEXT INPUTS */
.ci{width:100%;border:none;background:transparent;text-align:center;font-size:13px;padding:4px 0;outline:none}
.cn{font-weight:800}
.cp{font-weight:700;font-size:11px;letter-spacing:0.5px}
.cv{font-size:15px;font-weight:900}
.gt{color:#9e741b}
.st{color:#5c5c5f}
.bt{color:#8a5529}

/* NEEDS TO WIN */
.needs-box{background:#fff;border-radius:18px;margin-bottom:12px;overflow:hidden}
.needs-hdr{background:#2c2c2e;padding:8px 12px;color:#fff;font-size:10px;font-weight:800;letter-spacing:1px}
.needs-row{display:flex;align-items:center;padding:10px 12px;gap:8px;border-bottom:1px solid #eee}
.needs-row:last-child{border-bottom:none}
.ndot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
.ndot.silver{background:#8e8e93}
.ndot.bronze{background:#9b5e2a}
.nname{font-size:12px;font-weight:700;flex:1}
.nright{display:flex;flex-direction:column;align-items:flex-end}
.nnum{font-size:15px;font-weight:900}
.nlbl{font-size:8px;color:#8e8e93}

/* MAP */
.map-box{background:#fff;border-radius:20px;padding:14px;margin-bottom:10px}
.map-title{text-align:center;font-size:11px;letter-spacing:2px;color:#8e8e93;margin-bottom:10px;font-weight:700}
.map-container{width:100%;height:140px;border-radius:16px;overflow:hidden;position:relative;background:#f0f0f3}
.map-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0f0f3}
.map-ph-plus{font-size:36px;color:#aaa}
.map-ph-hint{font-size:10px;color:#aaa}
#mapImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
#mapFile{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}

/* DOWNLOAD */
.dl-wrap{padding:18px;background:#f2f2f4}
#dlBtn{width:100%;padding:16px;border:none;background:#1c1c1e;color:#fff;font-weight:700;font-size:16px;border-radius:40px;cursor:pointer}
</style>
</head>
<body>
<div class="wrapper">
 <div class="container" id="captureArea">

  <!-- HEADER -->
  <div class="top">
   <h1>Election Results</h1>
   <div id="clock">--:--:--</div>
  </div>

  <!-- ADDRESS -->
  <div class="address-box">
   <span class="address-icon">📍</span>
   <input class="addr-inp" id="addrInp" type="text" placeholder="Election venue / address">
  </div>

  <hr>

  <!-- CARDS -->
  <div class="cards">

   <!-- 1ST -->
   <div class="card gold">
    <div class="rank">1st</div>
    <div class="photo-wrap">
     <div class="ring-bg gold-ring">
      <div class="circle">
       <span class="plus">+</span>
       <img id="img1" alt="">
      </div>
     </div>
     <input type="file" accept="image/*" class="photo-input" id="ph1" onchange="uploadPhoto(this, 'img1')">
    </div>
    <div class="divider"></div>
    <input class="ci cn gt" id="n1" value="THOMAS F." oninput="updateNames()">
    <input class="ci cp gt" id="p1" value="PROGRESS">
    <input class="ci cv gt" id="v1" value="14250" oninput="updateVotes()">
   </div>

   <!-- 2ND -->
   <div class="card silver">
    <div class="rank">2nd</div>
    <div class="photo-wrap">
     <div class="ring-bg silver-ring">
      <div class="circle">
       <span class="plus">+</span>
       <img id="img2" alt="">
      </div>
     </div>
     <input type="file" accept="image/*" class="photo-input" id="ph2" onchange="uploadPhoto(this, 'img2')">
    </div>
    <div class="divider"></div>
    <input class="ci cn st" id="n2" value="LISA M." oninput="updateNames()">
    <input class="ci cp st" id="p2" value="UNITY">
    <input class="ci cv st" id="v2" value="11230" oninput="updateVotes()">
   </div>

   <!-- 3RD -->
   <div class="card bronze">
    <div class="rank">3rd</div>
    <div class="photo-wrap">
     <div class="ring-bg bronze-ring">
      <div class="circle">
       <span class="plus">+</span>
       <img id="img3" alt="">
      </div>
     </div>
     <input type="file" accept="image/*" class="photo-input" id="ph3" onchange="uploadPhoto(this, 'img3')">
    </div>
    <div class="divider"></div>
    <input class="ci cn bt" id="n3" value="JAMES K." oninput="updateNames()">
    <input class="ci cp bt" id="p3" value="HORIZON">
    <input class="ci cv bt" id="v3" value="9850" oninput="updateVotes()">
   </div>

  </div>

  <!-- NEEDS TO WIN -->
  <div class="needs-box">
   <div class="needs-hdr">🗳 VOTES NEEDED TO WIN</div>
   <div class="needs-row">
    <div class="ndot silver">2</div>
    <div class="nname" id="needsName2">LISA M.</div>
    <div class="nright">
     <div class="nnum" id="needsVotes2">0</div>
     <div class="nlbl">votes needed</div>
    </div>
   </div>
   <div class="needs-row">
    <div class="ndot bronze">3</div>
    <div class="nname" id="needsName3">JAMES K.</div>
    <div class="nright">
     <div class="nnum" id="needsVotes3">0</div>
     <div class="nlbl">votes needed</div>
    </div>
   </div>
  </div>

  <hr>

  <!-- MAP -->
  <div class="map-box">
   <div class="map-title">REGION MAP</div>
   <div class="map-container">
    <div class="map-ph" id="mapPH">
     <div class="map-ph-plus">+</div>
     <div class="map-ph-hint">Tap to add map</div>
    </div>
    <img id="mapImg" alt="">
    <input type="file" accept="image/*" id="mapFile" onchange="uploadMap(this)">
   </div>
  </div>

 </div>

 <!-- DOWNLOAD BUTTON -->
 <div class="dl-wrap">
  <button id="dlBtn" onclick="downloadImage()">⬇ Download JPG</button>
 </div>
</div>

<script>
// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const hours = now.getHours().toString().padStart(2, '0');
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const seconds = now.getSeconds().toString().padStart(2, '0');
  document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
}
updateClock();
setInterval(updateClock, 1000);

// ===== PHOTO UPLOAD =====
function uploadPhoto(input, imgId) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById(imgId);
      img.src = e.target.result;
      img.style.display = 'block';
      
      // Hide plus sign
      const plus = img.parentElement.querySelector('.plus');
      if (plus) plus.style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

// ===== MAP UPLOAD =====
function uploadMap(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.getElementById('mapImg');
      img.src = e.target.result;
      img.style.display = 'block';
      
      // Hide placeholder
      document.getElementById('mapPH').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

// ===== VOTE CALCULATIONS (AUTOMATIC) =====
function getVote(id) {
  const val = document.getElementById(id).value;
  return parseInt(val.replace(/[^0-9]/g, '')) || 0;
}

function updateVotes() {
  const v1 = getVote('v1');
  const v2 = getVote('v2');
  const v3 = getVote('v3');
  
  // Calculate votes needed
  const need2 = Math.max(0, v1 - v2 + 1);
  const need3 = Math.max(0, v1 - v3 + 1);
  
  // Update display
  document.getElementById('needsVotes2').textContent = need2.toLocaleString();
  document.getElementById('needsVotes3').textContent = need3.toLocaleString();
}

function updateNames() {
  document.getElementById('needsName2').textContent = document.getElementById('n2').value || '2nd Place';
  document.getElementById('needsName3').textContent = document.getElementById('n3').value || '3rd Place';
}

// Initial update
updateVotes();
updateNames();

// ===== DOWNLOAD IMAGE (SIMPLE) =====
function downloadImage() {
  const btn = document.getElementById('dlBtn');
  btn.textContent = 'Processing...';
  btn.disabled = true;
  
  const element = document.getElementById('captureArea');
  
  // Use html2canvas from CDN
  html2canvas(element, {
    scale: 2,
    backgroundColor: '#f2f2f4',
    logging: false
  }).then(canvas => {
    // Create download link
    const link = document.createElement('a');
    link.download = 'election-results.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
    
    btn.textContent = '⬇ Download JPG';
    btn.disabled = false;
  }).catch(error => {
    alert('Download failed. Please try again.');
    btn.textContent = '⬇ Download JPG';
    btn.disabled = false;
  });
}

// Auto-format votes with commas on blur
document.querySelectorAll('.cv').forEach(input => {
  input.addEventListener('blur', function() {
    const num = parseInt(this.value.replace(/[^0-9]/g, '')) || 0;
    this.value = num.toLocaleString();
    updateVotes();
  });
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
