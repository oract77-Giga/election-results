<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Election Results — luxury</title>
<link rel="stylesheet" href="stylr.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

<div class="wrapper">
  <!-- CAPTURE AREA - button NOT included -->
  <div class="container" id="captureArea">

    <!-- header with live clock -->
    <div class="top">
      <h1>Election Results</h1>
      <div id="clock">Updated --</div>
    </div>

    <hr>

    <!-- cards row -->
    <div class="cards">

      <!-- 1st place -->
      <div class="card gold">
        <div class="rank">1st</div>
        <label class="story">
          <input type="file" class="imgUpload" accept="image/*">
          <div class="story-ring gold-ring">
            <div class="circle">
              <span class="plus">+</span>
              <img class="preview" alt="">
            </div>
          </div>
        </label>
        <div class="divider"></div>
        <div class="text-container">
          <div class="name gold-text">THOMAS F.</div>
          <div class="party gold-text">PROGRESS</div>
          <div class="votes gold-text">14,250</div>
        </div>
      </div>

      <!-- 2nd place -->
      <div class="card silver">
        <div class="rank">2nd</div>
        <label class="story">
          <input type="file" class="imgUpload" accept="image/*">
          <div class="story-ring silver-ring">
            <div class="circle">
              <span class="plus">+</span>
              <img class="preview" alt="">
            </div>
          </div>
        </label>
        <div class="divider"></div>
        <div class="text-container">
          <div class="name silver-text">LISA M.</div>
          <div class="party silver-text">UNITY</div>
          <div class="votes silver-text">11,230</div>
        </div>
      </div>

      <!-- 3rd place -->
      <div class="card bronze">
        <div class="rank">3rd</div>
        <label class="story">
          <input type="file" class="imgUpload" accept="image/*">
          <div class="story-ring bronze-ring">
            <div class="circle">
              <span class="plus">+</span>
              <img class="preview" alt="">
            </div>
          </div>
        </label>
        <div class="divider"></div>
        <div class="text-container">
          <div class="name bronze-text">JAMES K.</div>
          <div class="party bronze-text">HORIZON</div>
          <div class="votes bronze-text">9,850</div>
        </div>
      </div>
    </div>

    <hr class="bottom-line">

    <!-- MAP section -->
    <div class="map-box">
      <div class="map-title">REGION MAP</div>
      <label class="map-upload">
        <input type="file" id="mapUpload" accept="image/*">
        <div class="map-container">
          <div class="map-placeholder">
            <span class="plus">+</span>
          </div>
          <img id="mapPreview" class="map-image" alt="">
        </div>
      </label>
    </div>

  </div> <!-- end captureArea -->
  
  <!-- DOWNLOAD BUTTON - outside capture area -->
  <div class="download-wrapper">
    <button id="downloadBtn">Download JPG</button>
  </div>
  
</div> <!-- end wrapper -->

<script src="script.js"></script>
</body>
</html>
